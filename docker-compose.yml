# 啄木鸟 PRD 评审 Agent — Docker Compose
#
# 用法:
#   docker compose run pecker 搜索优化 --workspace /workspace
#   docker compose run feedback --code-dir /code --report /workspace/output/report.md
#   docker compose run gate --workspace /workspace

services:
  pecker:
    build: .
    env_file: .env
    volumes:
      - ./workspace:/workspace
      - ./shared-wiki:/wiki
    environment:
      - WIKI_PATH=/wiki
    stdin_open: true
    tty: true

  feedback:
    build: .
    env_file: .env
    entrypoint: ["python", "feedback.py"]
    volumes:
      - ./workspace:/workspace
    command: ["--help"]

  gate:
    build: .
    entrypoint: ["python", "shrike_review.py"]
    volumes:
      - ./workspace:/workspace
    command: ["--workspace", "/workspace"]

  # FastAPI 后端(评审 API + SSE + 登录 + 报告)
  api:
    build: .
    env_file: .env
    entrypoint: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - USE_CLAUDE_CODE=1
      - PECKER_ENV=prod

  # Next.js 前端(5 阶段 wizard + 赛博森林首页 + 10 鸟家族)
  frontend:
    build: ./web
    ports:
      - "3000:3000"
    depends_on:
      - api

  # [遗留] Streamlit 旧版(仅 CLI 调试用,正式使用 frontend)
  web-legacy:
    build: .
    env_file: .env
    entrypoint: ["streamlit", "run", "app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - ./workspace:/workspace
      - ./shared-wiki:/wiki
    environment:
      - WIKI_PATH=/wiki

  feishu-bot:
    build: .
    env_file: .env
    entrypoint: ["uvicorn", "feishu_bot:app", "--host", "0.0.0.0", "--port", "9000"]
    ports:
      - "9000:9000"
    volumes:
      - ./workspace:/workspace
      - ./shared-wiki:/wiki
    environment:
      - WIKI_PATH=/wiki
