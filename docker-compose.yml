# 啄木鸟 PRD 评审 Agent — Docker Compose
#
# 用法:
#   docker compose run pecker 搜索优化 --workspace /workspace
#   docker compose run feedback --code-dir /code --report /workspace/output/report.md
#   docker compose run gate --workspace /workspace

services:
  pecker:
    build: .
    env_file: .env
    volumes:
      - ./workspace:/workspace
      - ./shared-wiki:/wiki
    environment:
      - WIKI_PATH=/wiki
    stdin_open: true
    tty: true

  feedback:
    build: .
    env_file: .env
    entrypoint: ["python", "feedback.py"]
    volumes:
      - ./workspace:/workspace
    command: ["--help"]

  gate:
    build: .
    entrypoint: ["python", "shrike_review.py"]
    volumes:
      - ./workspace:/workspace
    command: ["--workspace", "/workspace"]

  # FastAPI 后端(评审 API + SSE + 登录 + 报告)
  api:
    build: .
    env_file: .env
    entrypoint: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - USE_CLAUDE_CODE=1
      - PECKER_ENV=prod

  # Next.js 前端 v8(Agent 工作台 + 工作文档)
  # v7 legacy 回退入口:/review?v=7
  frontend:
    build:
      context: ./web
      # 如果 build 时网络访问 Google Fonts 失败,传 HTTPS_PROXY=http://host.docker.internal:7890
      # args:
      #   HTTPS_PROXY: ${HTTPS_PROXY}
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      # Next.js rewrites 把 /api/* 代理到容器网络里的 api service
      - API_BASE_URL=http://api:8000
      # 浏览器端 precheck / SSE 走同源相对路径(fallback="")· 外部反代
      # (Cloudflare Tunnel / nginx)按 path 分流:/api/* → api:8000,其他 → 前端。
      # 若要浏览器直连某个域名绕反代,这里加 NEXT_PUBLIC_SSE_BASE=https://xxx,
      # 但注意 NEXT_PUBLIC_* 是 build-time 内联,需要 web/Dockerfile 加 ARG 重 build。

  # [遗留] Streamlit 旧版(仅 CLI 调试用,正式使用 frontend)
  web-legacy:
    build: .
    env_file: .env
    entrypoint: ["streamlit", "run", "legacy/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - ./workspace:/workspace
      - ./shared-wiki:/wiki
    environment:
      - WIKI_PATH=/wiki

  feishu-bot:
    build: .
    env_file: .env
    entrypoint: ["uvicorn", "feishu_bot:app", "--host", "0.0.0.0", "--port", "9000"]
    ports:
      - "9000:9000"
    volumes:
      - ./workspace:/workspace
      - ./shared-wiki:/wiki
    environment:
      - WIKI_PATH=/wiki
