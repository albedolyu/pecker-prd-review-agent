# 多模型路由配置 — Pecker 多 vendor / 多 tier 全链路统一抽象
#
# 改这里 = 改全链路 model 选择，不需要改代码。
# 新增 vendor 见 clients/factory.py docstring。
# 调用方改 model_router.route_call(route_id, ...) 进入此路由表。
#
# route_id 命名空间:
#   worker.<dim_key>          各维度 worker (GPT-only 默认由 route 表控制分档)
#   advisor.goshawk[.recheck|.shadow]  苍鹰主审 / 二次校验 / 影子实验槽位
#   verify.nli                evidence_verify NLI 校验
#   router.intent             意图路由 (Haiku 三分类)
#   eval.<scorer>             评测期间 LLM-as-judge 调用
#
# 全局开关 (env):
#   PECKER_ROUTES_FILE                覆盖默认 model_routes.yaml 路径 (实验/灰度用)
#   PECKER_MODEL_OVERRIDE             等价 --model auto/opus/sonnet/haiku/gpt55/gpt54/gpt54mini, 仅覆盖 worker.* 的 tier
#   PECKER_ENABLE_SHADOW_ADVISOR=1    一键开 advisor.goshawk.shadow

vendors:
  anthropic:
    cli_client: clients.claude_cli.ClaudeCodeCLIClient
    native_client: clients.anthropic_native.AnthropicNativeClient
    model_tiers:
      opus:   claude-opus-4-7
      sonnet: claude-sonnet-4-6
      haiku:  claude-haiku-4-5-20251001
    fallback_chain: [opus, sonnet, haiku]

  # OpenAI 接入: 团队上线默认走 API key, 避免单机 Codex OAuth/OAT session 被多人并发挤掉.
  # 本地开发仍可把单个 route transport 临时改回 cli.
  openai:
    cli_client: clients.codex_cli.CodexCLIClient
    native_client: clients.openai_native.OpenAINativeClient
    model_tiers:
      gpt55:    gpt-5.5                # ChatGPT Pro 通过 codex 默认 model
      gpt54:    gpt-5.4                # codex 兼容降级 (notice.model_migrations 默认 fallback)
      gpt54mini: gpt-5.4-mini          # GPT-only smooth tier: 小任务 / NLI / 低风险复核
    fallback_chain: [gpt55, gpt54, gpt54mini]

  # DeepSeek 接入 (2026-04-28): worker 维度走 DeepSeek 绕开 Anthropic OAuth burst
  # 需要 .env 配 DEEPSEEK_API_KEY; OpenAI SDK 兼容,无新依赖
  deepseek:
    native_client: clients.deepseek_native.DeepSeekNativeClient
    model_tiers:
      pro:      deepseek-v4-pro     # ⚠️ 服务端路由到 reasoner, 不支持 tool_choice=required, worker 不能用
      flash:    deepseek-v4-flash   # 轻量, 快, function calling 完整支持, worker 默认
      chat:     deepseek-chat       # alias 当前指 v4-flash
    fallback_chain: [flash]

routes:
  # ============================================================
  # Worker 维度 (4-6 个并行 worker)
  # GPT-only pilot: worker 默认模型由本 route 表统一控制;
  # dimensions.yaml 的 legacy dim["model"] 仅保留为历史配置, 不再覆盖路由分档。
  # ============================================================
  # 2026-05-08: team beta stable route. 并行 worker 默认 gpt54, 终审 advisor 保留 gpt55.
  worker.default:      {vendor: openai, transport: native, model: gpt54, retry_policy: worker}
  worker.structure:    {vendor: openai, transport: native, model: gpt54, retry_policy: worker}
  worker.compliance:   {vendor: openai, transport: native, model: gpt54, retry_policy: worker}
  worker.data_quality: {vendor: openai, transport: native, model: gpt54, retry_policy: worker}
  worker.quality:      {vendor: openai, transport: native, model: gpt54, retry_policy: worker}
  worker.consistency:  {vendor: openai, transport: native, model: gpt54, retry_policy: worker}
  worker.ai_coding:    {vendor: openai, transport: native, model: gpt54, retry_policy: worker}
  worker.ai_friendly:  {vendor: openai, transport: native, model: gpt54, retry_policy: worker}

  # ============================================================
  # 苍鹰 meta-reviewer
  # ============================================================
  advisor.goshawk:
    vendor: openai
    transport: native
    model: gpt55             # GPT-only pilot: 终审仍保留最高档, 控制漏报/误判风险
    retry_policy: advisor

  advisor.goshawk.recheck:
    vendor: openai
    transport: native
    model: gpt54             # 因果复核比 NLI 重, 但不必常驻最高档
    retry_policy: router

  # P2 影子苍鹰 (默认 disabled)
  # 启用后 model_router.route_call_with_shadow 会异步并发跑, 仅落 logs/shadow_*.jsonl 不影响主路径
  # scripts/eval_dual_advisor.py 启用此 route 跑跨 vendor 互补率实验
  advisor.goshawk.shadow:
    vendor: openai
    transport: native
    model: gpt54
    retry_policy: advisor
    enabled: false

  # ============================================================
  # Evidence verify NLI (高频小任务, evidence_verify._llm_nli_score)
  # GPT-only pilot: 用 GPT mini 档减少校验链路体感延迟, 保持统一 provider.
  verify.nli:
    vendor: openai
    transport: native
    model: gpt54mini
    retry_policy: router

  # 知识盲区预检: Web Phase 1 也必须走 GPT 路由,避免团队版回落到个人 Claude/OAT.
  precheck.gaps:
    vendor: openai
    transport: native
    model: gpt54mini
    retry_policy: router

  # 注: router.intent (PRD 复杂度自动路由) 已删 (2026-04-28).
  # 主啄木鸟默认 --model opus, 不需要再过 Haiku 分类层.

  # ============================================================
  # Eval LLM-as-judge (cuckoo_eval scorer 调用)
  # ============================================================
  eval.cuckoo:
    vendor: openai
    transport: native
    model: gpt54
    retry_policy: foreground
