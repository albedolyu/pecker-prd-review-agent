# 多模型路由配置 — Pecker 多 vendor / 多 tier 全链路统一抽象
#
# 改这里 = 改全链路 model 选择，不需要改代码。
# 新增 vendor 见 clients/factory.py docstring。
# 调用方改 model_router.route_call(route_id, ...) 进入此路由表。
#
# route_id 命名空间:
#   worker.<dim_key>          各维度 worker (兼容 dimensions.yaml 的 dim["model"] tier 别名 override)
#   advisor.goshawk[.recheck|.shadow]  苍鹰主审 / 二次校验 / 影子实验槽位
#   verify.nli                evidence_verify NLI 校验
#   router.intent             意图路由 (Haiku 三分类)
#   eval.<scorer>             评测期间 LLM-as-judge 调用
#
# 全局开关 (env):
#   PECKER_ROUTES_FILE                覆盖默认 model_routes.yaml 路径 (实验/灰度用)
#   PECKER_MODEL_OVERRIDE             等价 --model auto/opus/sonnet/haiku, 仅覆盖 worker.* 的 tier
#   PECKER_ENABLE_SHADOW_ADVISOR=1    一键开 advisor.goshawk.shadow

vendors:
  anthropic:
    cli_client: clients.claude_cli.ClaudeCodeCLIClient
    native_client: clients.anthropic_native.AnthropicNativeClient
    model_tiers:
      opus:   claude-opus-4-7
      sonnet: claude-sonnet-4-6
      haiku:  claude-haiku-4-5-20251001
    fallback_chain: [opus, sonnet, haiku]

  # OpenAI 接入 (2026-04-28): 走 codex CLI 复用 ChatGPT Pro OAuth, 零 API key
  # 用法: 先 `codex login` (已经做过). worker 单调用 ~30K input token (codex 自带 system overhead)
  openai:
    cli_client: clients.codex_cli.CodexCLIClient
    model_tiers:
      gpt55:    gpt-5.5                # ChatGPT Pro 通过 codex 默认 model
      gpt54:    gpt-5.4                # codex 兼容降级 (notice.model_migrations 默认 fallback)
    fallback_chain: [gpt55, gpt54]

  # DeepSeek 接入 (2026-04-28): worker 维度走 DeepSeek 绕开 Anthropic OAuth burst
  # 需要 .env 配 DEEPSEEK_API_KEY; OpenAI SDK 兼容,无新依赖
  deepseek:
    native_client: clients.deepseek_native.DeepSeekNativeClient
    model_tiers:
      pro:      deepseek-v4-pro     # ⚠️ 服务端路由到 reasoner, 不支持 tool_choice=required, worker 不能用
      flash:    deepseek-v4-flash   # 轻量, 快, function calling 完整支持, worker 默认
      chat:     deepseek-chat       # alias 当前指 v4-flash
    fallback_chain: [flash]

routes:
  # ============================================================
  # Worker 维度 (4-6 个并行 worker)
  # dimensions.yaml 里的 dim["model"] = "sonnet"|"opus"|"haiku" 仍然生效,
  # model_router 把 dim["model"] 当 model_override 传入, 覆盖此处 model 字段。
  # ============================================================
  # 2026-04-28: 全 worker 维度切 DeepSeek (绕 Anthropic OAuth burst, 见 STATUS.md 401 警告)
  worker.default:      {vendor: openai, transport: cli, model: gpt55, retry_policy: worker}
  worker.structure:    {vendor: openai, transport: cli, model: gpt55, retry_policy: worker}
  worker.compliance:   {vendor: openai, transport: cli, model: gpt55, retry_policy: worker}
  worker.data_quality: {vendor: openai, transport: cli, model: gpt55, retry_policy: worker}
  worker.quality:      {vendor: openai, transport: cli, model: gpt55, retry_policy: worker}
  worker.consistency:  {vendor: openai, transport: cli, model: gpt55, retry_policy: worker}
  worker.ai_friendly:  {vendor: openai, transport: cli, model: gpt55, retry_policy: worker}

  # ============================================================
  # 苍鹰 meta-reviewer
  # ============================================================
  advisor.goshawk:
    vendor: anthropic
    transport: cli           # 2026-04-28: OAT 走 CLI 复用登录态; native 路径会把 OAT 当 sk-key 直传 → 401
    model: opus              # 反转实验失败 (worker 切 Opus 撞 OAuth race, GPT-5.5 当苍鹰也未带来增益), 回 Opus
    retry_policy: advisor

  advisor.goshawk.recheck:
    vendor: anthropic
    transport: cli
    model: sonnet            # 2026-04-28: 升级 haiku→sonnet, recheck 是因果判断不是分类, 中文 PRD 场景 Haiku 误判 ~25% 污染主审 fp 标记; CC OAT 订阅 0 成本
    retry_policy: router

  # P2 影子苍鹰 (默认 disabled)
  # 启用后 model_router.route_call_with_shadow 会异步并发跑, 仅落 logs/shadow_*.jsonl 不影响主路径
  # scripts/eval_dual_advisor.py 启用此 route 跑跨 vendor 互补率实验
  advisor.goshawk.shadow:
    vendor: anthropic        # P1 codex 接入后改为 openai
    transport: cli
    model: opus              # 暂用同 vendor 高 tier dry-run, P1 后切跨 vendor
    retry_policy: advisor
    enabled: false

  # ============================================================
  # Evidence verify NLI (高频小任务, evidence_verify._llm_nli_score)
  # 2026-04-28: 切 DeepSeek-flash 直连 — 原 Haiku CLI 子进程跟 codex worker 子进程
  # 争 anthropic OAT 频繁 401; DeepSeek 独立 API key 无 OAuth race; 中文 NLI 比
  # Haiku 强且 function calling JSON 输出更稳定 (不再需要单词扫描 fallback)
  verify.nli:
    vendor: deepseek
    transport: native
    model: flash
    retry_policy: router

  # 注: router.intent (PRD 复杂度自动路由) 已删 (2026-04-28).
  # 主啄木鸟默认 --model opus, 不需要再过 Haiku 分类层.

  # ============================================================
  # Eval LLM-as-judge (cuckoo_eval scorer 调用)
  # ============================================================
  eval.cuckoo:
    vendor: anthropic
    transport: cli
    model: sonnet
    retry_policy: foreground
