function Board({ label, w, h, theme='light', children, pad=0, bg }) {

    <DCArtboard label={label} width={w} height={h}>

  );
}

function FeishuItem({n, title, tag, conf, status, anchor}) {

// ─── Export state toasts ─────────────────────────────────────
function Toast({ state }) {
  const map = {
    progress: { bg:'var(--surface-raised)', fg:'var(--text-strong)',
                icon:<Spinner/>, text:'正在导出 Markdown...' },
    success:  { bg:'var(--status-done-bg)', fg:'var(--status-done-fg)',
                icon:'✓', text:'飞书文档已创建 · 点击打开 →' },
    error:    { bg:'var(--status-failed-bg)', fg:'var(--status-failed-fg)',
                icon:'!', text:'PDF 导出失败 · 字体缺失 · 点击重试' },
  }[state];
  return (
    <div style={{
      display:'inline-flex', alignItems:'center', gap:10,
      padding:'10px 14px', background:map.bg, color:map.fg,
      borderRadius:'var(--r-4)', border:'1px solid ' + (state==='progress' ? 'var(--border-default)' : 'transparent'),
      fontSize:13, fontWeight:500,
      boxShadow: state === 'progress' ? 'var(--shadow-md)' : 'none',
    }}>
      <span style={{
        display:'inline-flex', alignItems:'center', justifyContent:'center',
        width:18, height:18, borderRadius:99,
        background: state==='success' ? 'var(--status-done-dot)'
                  : state==='error'   ? 'var(--status-failed-dot)' : 'transparent',
        color: state === 'progress' ? undefined : '#fff',
        fontSize:11, fontWeight:700,
      }}>{map.icon}</span>
      {map.text}
    </div>
  );
}
function Spinner() {
  return (
    <svg width="14" height="14" viewBox="0 0 14 14" style={{animation:'spin 800ms linear infinite'}}>
      <circle cx="7" cy="7" r="5" fill="none" stroke="var(--neutral-200)" strokeWidth="1.5"/>
      <path d="M7 2 a5 5 0 0 1 5 5" fill="none" stroke="var(--accent-500)" strokeWidth="1.5" strokeLinecap="round"/>
    </svg>
  );
}
