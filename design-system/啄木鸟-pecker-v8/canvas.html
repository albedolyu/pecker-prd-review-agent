<style>

  .tweaks {
    position:fixed; right:16px; bottom:16px; z-index:9999;

<script>

<script type="text/babel">
// ─── Artboard wrapper that carries theme data attrs ───────────
function Board({ label, w, h, theme='light', phase2=false, children, bg, pad=24 }) {
  return (
    <DCArtboard label={label} width={w} height={h}>
      <div data-theme={theme} {...(phase2 ? {'data-phase2': true} : {})} style={{
        width:'100%', height:'100%',
        background: bg || 'var(--surface-canvas)',
        color: 'var(--text-default)',
        padding: pad,
        overflow:'hidden',
      }}>
        {children}
      </div>
    </DCArtboard>
  );
}

function Row({ children, gap=16, style={} }) {
  return <div style={{display:'flex', gap, alignItems:'flex-start', flexWrap:'wrap', ...style}}>{children}</div>;
}
function Col({ children, gap=12, style={} }) {
  return <div style={{display:'flex', flexDirection:'column', gap, ...style}}>{children}</div>;
}
function Label({ children }) {
  return <div style={{
    fontSize:11, textTransform:'uppercase', letterSpacing:'.8px',
    color:'var(--text-muted)', fontWeight:600, marginBottom:4,
  }}>{children}</div>;
}

      <div style={{ padding:'0 60px 40px' }}>

        </div>

      </div>

      {/* === 1 · TOKEN · color ══════════════════════════════════ */}
      <DCSection title="01 · Tokens — Color" subtitle="浅色 + 暗色双版本。accent 单色；status 四态 + pill；5 色失败分类。">

          <Col gap={8}>
            <Label>neutral scale</Label>

        <Board label="暗 · neutral" w={460} h={280} theme="dark">
          <Col gap={8}>

            <Label>accent</Label>
            <AccentRamp/>
          </Col>
        </Board>

        <Board label="status 四态 + warn/info" w={420} h={280}>
          <Col gap={10}>
            <StatusSwatch name="queued"/>
            <StatusSwatch name="running"/>
            <StatusSwatch name="done"/>
            <StatusSwatch name="failed"/>
            <div style={{display:'flex', gap:8}}>
              <StatusSwatch name="warn" compact/>
              <StatusSwatch name="info" compact/>
            </div>
          </Col>
        </Board>

        <Board label="5 色失败分类 · Phase 1.5" w={420} h={280}>
          <Col gap={8}>
            <FailRow code="quota_exhausted"  tok="--fail-quota"  desc="配额打满"/>
            <FailRow code="tool_call_failed" tok="--fail-tool"   desc="工具调用挂了"/>
            <FailRow code="json_parse_error" tok="--fail-json"   desc="JSON 解析错误"/>
            <FailRow code="empty_submission" tok="--fail-empty"  desc="空提交（静默失败 · 冷灰不喊叫）"/>
            <FailRow code="timeout"          tok="--fail-timeout" desc="超时"/>

        </Board>

        <Board label="10 鸟识别色" w={460} h={280}>

              <Col gap={4} style={{alignItems:'center'}}><BirdAvatar id={7} size="lg" placeholder/><span style={s_tinyLabel}>占位</span></Col>
              <Col gap={4} style={{alignItems:'center'}}><BirdAvatar id={8} size="lg" placeholder/><span style={s_tinyLabel}>占位</span></Col>

        <Board label="5 种失败分类（全部 failed 态）" w={1140} h={260} phase2>
          <Row gap={12}>
            <AgentStatusCard birdId={1} status="failed" tokens="—"   elapsed="—"    failReason="quota_exhausted"/>
            <AgentStatusCard birdId={2} status="failed" tokens="1.2k" elapsed="8.9s" failReason="tool_call_failed"/>
            <AgentStatusCard birdId={3} status="failed" tokens="2.0k" elapsed="14s"  failReason="json_parse_error"/>
            <AgentStatusCard birdId={4} status="failed" tokens="0.4k" elapsed="4.2s" failReason="empty_submission"/>

            <AgentStatusCard variant="meta" birdId={5} status="running" progress={40} note="交叉校验中" tokens="4.1k" elapsed="18.0s" model="opus-4"/>
            <AgentStatusCard variant="meta" birdId={5} status="running" progress={72} note="漏报补充 3/5" tokens="5.8k" elapsed="32.7s" model="opus-4"/>

            <AgentStatusCard birdId={1} status="queued"  model="sonnet-4-6"/>
            <AgentStatusCard birdId={2} status="running" progress={62} tokens="2.1k" elapsed="12.4s" model="sonnet-4-6" note="分析中"/>
            <AgentStatusCard birdId={3} status="done"    tokens="3.8k" elapsed="28.1s" submissions={7} model="sonnet-4-6"/>
            <AgentStatusCard birdId={4} status="failed"  tokens="0.4k" elapsed="4.2s"  failReason="empty_submission" model="sonnet-4-6"/>
          </Row>
        </Board>
      </DCSection>

      {/* Post-its · 关键决策 */}
      <DCPostIt top={120} right={60} width={220} rotate={-2}>
        Phase 2 的「A 调度中心」气质通过 data-phase2 属性实现：冷一档 + 对比 +20%，不做全暗色。
      </DCPostIt>
      <DCPostIt top={980} left={40} width={200} rotate={2}>
        苍鹰 = 紫色，与 worker 4 色在 hue 上拉开。视觉承诺：meta ≠ worker。
      </DCPostIt>
      <DCPostIt top={2400} right={60} width={240} rotate={-1.5}>
        「依赖边」动效：worker done 后对应虚线变实 + 橙点沿线段流向苍鹰。PM 3 秒判"系统跑到哪"。
      </DCPostIt>

      <div style={{height:80}}/>
    </DesignCanvas>
  );

// ── swatches ─────────────────────────────────────────────────
function NeutralRamp({ theme }) {
  const keys = ['0','25','50','100','150','200','300','400','500','600','700','800','900'];
  return (
    <div data-theme={theme} style={{display:'flex', border:'1px solid var(--border-subtle)', borderRadius:4, overflow:'hidden'}}>
      {keys.map(k => (
        <div key={k} title={`--neutral-${k}`} style={{
          flex:1, height:40, background:`var(--neutral-${k})`,
          display:'flex', alignItems:'flex-end', justifyContent:'center',
          fontFamily:'var(--font-mono)', fontSize:9, color: +k>=400 ? '#fff' : 'var(--text-muted)',
          paddingBottom:3,
        }}>{k}</div>
      ))}
    </div>
  );
}
function AccentRamp() {
  const keys = ['50','100','200','300','400','500','600','700','800'];
  return (
    <div style={{display:'flex', border:'1px solid var(--border-subtle)', borderRadius:4, overflow:'hidden'}}>
      {keys.map(k => (
        <div key={k} title={`--accent-${k}`} style={{
          flex:1, height:40, background:`var(--accent-${k})`,
          display:'flex', alignItems:'flex-end', justifyContent:'center',
          fontFamily:'var(--font-mono)', fontSize:9, color: +k>=400 ? '#fff' : 'var(--accent-700)',
          paddingBottom:3,
        }}>{k}</div>
      ))}
    </div>
  );
}
function StatusSwatch({ name, compact }) {
  return (
    <div style={{
      display:'flex', alignItems:'center', gap:10, padding: compact ? '6px 10px' : '8px 12px',
      background:`var(--status-${name}-bg)`, borderRadius:'var(--r-3)', flex: compact ? 1 : 'unset',
    }}>
      <StatusDot status={name==='warn'?'warn':name} size={8}/>
      <span style={{fontSize:12, color:`var(--status-${name}-fg)`, fontWeight:600}}>{name}</span>
      {!compact && <span style={{fontSize:11, color:'var(--text-muted)', marginLeft:'auto', fontFamily:'var(--font-mono)'}}>
        --status-{name}-*
      </span>}
    </div>
  );
}
function FailRow({ code, tok, desc }) {
  return (
    <div style={{display:'flex', alignItems:'center', gap:10}}>
      <span style={{width:14, height:14, borderRadius:3, background:`var(${tok})`, flexShrink:0}}/>
      <span style={{fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-strong)', fontWeight:500, minWidth:140}}>{code}</span>
      <span style={{fontSize:12, color:'var(--text-muted)'}}>{desc}</span>
    </div>
  );
}
function BirdSwatch({ id }) {
  const meta = BIRD_META[id];
  return (
    <div style={{display:'flex', flexDirection:'column', alignItems:'flex-start', gap:4}}>
      <span style={{width:'100%', height:36, borderRadius:4, background:`var(--bird-${id})`}}/>
      <span style={{fontSize:10, fontFamily:'var(--font-mono)', color:'var(--text-muted)'}}>bird-{id}</span>
      <span style={{fontSize:11, color:'var(--text-default)'}}>{meta.label}</span>
    </div>
  );
}

function TypeRow({ size, label, fw, children }) {
  return (
    <div style={{display:'flex', alignItems:'baseline', gap:16, borderBottom:'1px dashed var(--border-subtle)', paddingBottom:8}}>
      <span style={{fontFamily:'var(--font-mono)', fontSize:10, color:'var(--text-muted)', width:80, flexShrink:0}}>{label}</span>
      <span style={{fontSize:Number(size), fontWeight:fw, color:'var(--text-strong)', lineHeight:1.2}}>{children}</span>
    </div>
  );
}
const s_tinyLabel = { fontSize:10, color:'var(--text-muted)', fontFamily:'var(--font-mono)' };

// ─── Phase 2 topology with dependency edges ────────────────────
function Topology() {
  // SVG 层绝对定位画依赖边
  return (
    <div style={{ position:'relative', width:'100%', height:'100%' }}>
      <svg viewBox="0 0 1080 460" preserveAspectRatio="none" style={{position:'absolute', inset:0, width:'100%', height:'100%', pointerEvents:'none'}}>
        {/* 4 worker → 1 meta。worker 锚点 x: 137/366/595/824 · y:180。meta 锚点 x:540 y:300 */}
        {[137, 366, 595, 824].map((x,i) => {
          const done = i === 2; // 第 3 个 done（id=3 体验鸟）
          return (
            <g key={i}>
              <path d={`M${x} 180 C ${x} 240, 540 240, 540 300`}
                    fill="none"
                    stroke={done ? 'var(--accent-500)' : 'var(--neutral-300)'}
                    strokeWidth={done ? 1.8 : 1.2}
                    strokeDasharray={done ? '0' : '4 4'}/>
              {done && (
                <circle r="3" fill="var(--accent-500)">
                  <animateMotion dur="1.6s" repeatCount="indefinite"
                    path={`M${x} 180 C ${x} 240, 540 240, 540 300`}/>
                </circle>
              )}
            </g>
          );
        })}
      </svg>

      {/* worker 层 */}
      <div style={{ position:'absolute', top:0, left:0, right:0, display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:12 }}>
        <AgentStatusCard birdId={1} status="running" progress={48} tokens="1.4k" elapsed="9.1s" model="sonnet-4-6" note="分析中"/>
        <AgentStatusCard birdId={2} status="running" progress={72} tokens="2.3k" elapsed="11.8s" model="sonnet-4-6" note="分析中"/>
        <AgentStatusCard birdId={3} status="done"    tokens="3.8k" elapsed="28.1s" submissions={7} model="sonnet-4-6"/>
        <AgentStatusCard birdId={4} status="running" progress={22} tokens="0.8k" elapsed="5.4s" model="sonnet-4-6" note="分析中"/>
      </div>

      {/* meta 层 */}
      <div style={{ position:'absolute', top:300, left:'50%', transform:'translateX(-50%)', width:'60%' }}>
        <AgentStatusCard variant="meta" birdId={5} status="queued" note="等待 worker 完成 1/4" model="opus-4"/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
// ── TWEAKS ────────────────────────────────────────────────────
(function(){
  const panel = document.getElementById('tweaks');
  const accentEl = document.getElementById('tw-accent');
  const densityEl = document.getElementById('tw-density');
  const themeEl = document.getElementById('tw-theme');

  function applyAccent(hex) {
    document.documentElement.style.setProperty('--accent-500', hex);
    document.documentElement.style.setProperty('--accent-600', shade(hex, -14));
    document.documentElement.style.setProperty('--status-running-dot', hex);
    document.documentElement.style.setProperty('--status-running-fg', shade(hex, -22));
  }
  function applyDensity(d) {
    document.documentElement.dataset.density = d;
    if (d === 'compact') {
      document.documentElement.style.setProperty('--sp-4','12px');
      document.documentElement.style.setProperty('--sp-6','16px');
    } else if (d === 'loose') {
      document.documentElement.style.setProperty('--sp-4','20px');
      document.documentElement.style.setProperty('--sp-6','28px');
    } else {
      document.documentElement.style.removeProperty('--sp-4');
      document.documentElement.style.removeProperty('--sp-6');
    }
  }
  function applyTheme(t) {
    // canvas 里 board 是独立 theme；这里切整体 body
    document.body.dataset.theme = t;
    if (t === 'dark') document.body.style.background = '#0e1217';
    else document.body.style.background = '#f0eee9';
  }
  function shade(hex, pct) {
    const n = parseInt(hex.slice(1),16);
    let r=(n>>16)&0xff, g=(n>>8)&0xff, b=n&0xff;
    const k = pct/100;
    r = Math.max(0,Math.min(255, Math.round(r + (k<0?r*k:(255-r)*k))));
    g = Math.max(0,Math.min(255, Math.round(g + (k<0?g*k:(255-g)*k))));
    b = Math.max(0,Math.min(255, Math.round(b + (k<0?b*k:(255-b)*k))));
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }

  // init from defaults
  accentEl.value = TWEAK_DEFAULS.accent; applyAccent(TWEAK_DEFAULS.accent);
  densityEl.value = TWEAK_DEFAULS.density; applyDensity(TWEAK_DEFAULS.density);
  themeEl.value = TWEAK_DEFAULS.theme; applyTheme(TWEAK_DEFAULS.theme);

  function persist(key, val) {
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[key]:val}}, '*');
  }
  accentEl.addEventListener('input', e => { applyAccent(e.target.value); persist('accent', e.target.value); });
  densityEl.addEventListener('change', e => { applyDensity(e.target.value); persist('density', e.target.value); });
  themeEl.addEventListener('change', e => { applyTheme(e.target.value); persist('theme', e.target.value); });

  // edit-mode protocol
  window.addEventListener('message', ev => {
    const d = ev.data || {};
    if (d.type === '__activate_edit_mode')   panel.dataset.on = '1';
    if (d.type === '__deactivate_edit_mode') panel.dataset.on = '0';
  });
  window.parent.postMessage({type:'__edit_mode_available'}, '*');
})();
</script>
</body>
