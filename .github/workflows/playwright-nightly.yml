name: Playwright Nightly Smoke

# 前端 e2e 冒烟, 不阻塞 PR, 只做夜间巡检 + 按需手动触发.
#
# 为什么分离成独立 workflow 而不是挂 PR:
# - smoke 需要装 chromium + 起 next build, 每次 PR 跑太重
# - 覆盖的是"纯视觉 + 路由可达"类问题, 对单次改动时效性不高
# - 作者自测又常常不做 (memory: feedback_verify_call_sites.md Rule 3 — 静态
#   工具链全绿 ≠ 实际行为验证), 夜间兜底比放任漂移强
#
# 触发:
# - schedule: UTC 18:00 = 北京时间 02:00, 早晨来能看到结果
# - workflow_dispatch: 改完前端想立刻跑时手动触发, 不需要等夜里
#
# 覆盖范围: tests/e2e/smoke.spec.ts + v8-routes.spec.ts, 都声明"不依赖后端",
# 所以本 workflow **不需要启 uvicorn + python**, 只起 next.

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playwright-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    name: Playwright smoke (Ubuntu + chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      # next build 的 rewrites 目标占位 — 本 workflow 不起后端, 前端 smoke
      # 也不调 /api/*, 所以任何值都行
      API_BASE_URL: http://localhost:8000
      CI: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Build Next
        run: pnpm build

      # playwright.config.ts 里的 webServer 配置会自动启停 next start :3000,
      # 不需要再手动 bg 启 + poll + kill.
      - name: Run Playwright e2e (smoke + v8-routes)
        run: pnpm exec playwright test --project chromium-desktop

      - name: Upload Playwright report + test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 14
          if-no-files-found: ignore
