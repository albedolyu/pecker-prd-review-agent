        | 【开庭公告】 | 案由 | 单级筛选 | 单选 | 根据数量从大到小排序 | 按案由分组统计 |
      why_passes: 排序与筛选完全是 ORDER BY publish_date / 数量倒序的规则驱动逻辑, 无 AI/LLM/推荐/相关性模型介入, 也不需要 eval 集和主指标 — 完全符合 EV-04 dont_fire_when "PRD 是规则驱动无 AI 特性"。
    _mock: false
    fire_when: PRD 提到 AI/LLM/推荐/排序/智能 ... 但 eval 集 / 主指标 / 回归触发缺任一项。
