  - id: RC-007
    name: 复杂联动逻辑有伪代码
    severity: should
    description: 复杂联动 (多级筛选 / 状态机 / 文本切分) 须有伪代码或流程描述, 不能纯文字描述。
    impact_score: 0.6
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 6.2 风险扫描 / 评分逻辑
      snippet: |
        诉前调解的风险评分逻辑:
        - 调解失败/未达成 → 风险 +5 分
        - 已达成 → 风险 +0 分
        - 多次调解 → 取最高分
        (无伪代码 / 无优先级 / 无 NULL 值处理)
      why_fails: 三档评分但没说"多次调解但全为已达成"怎么算, 也没给伪代码或决策表, 开发自由发挥。
    negative_example:
      source_file: workspace-对外投资/prd/数据维度-对外投资增加间接投资_原始版本.md
      section: 三、业务规则 / 3.6 筛选规则 / 二级行业筛选构建逻辑
      snippet: |
        ```python
        industry_options = []
        for company in current_list:
            level1 = company.nic_id_cn_level1
            level2 = company.nic_id_cn_level2
            add_if_not_exists(industry_options, level1)
            if level2:
                add_if_not_exists(industry_options, level2)
        ```
      why_passes: 用 Python 伪代码描述多级行业的筛选构造, 含 NULL 值分支, 开发可直接转译。
    fire_when: PRD 描述了复杂联动 (≥3 级筛选 / 状态机 / 文本拆分) 但全文无伪代码 / 流程图。
    dont_fire_when: 联动有伪代码或决策表, 或联动逻辑简单 (单级 if-else)。

  - id: RC-008
    name: 筛选追溯完整
    severity: must
    description: 筛选/查询逻辑须从用户操作追溯到 WHERE 条件, 中间无断点。
    impact_score: 0.75
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 2.1 Web UI / 筛选项
      snippet: |
        ### 2.1 Web UI
        字段展示、筛选项、搜索项、导出，全都和立案信息UI保持一致
        (无: 用户点击"案由"筛选 → 触发什么接口 → 接口入参什么 → SQL WHERE 什么)
      why_fails: 只说"筛选项保持一致", 没追溯到 SQL 层面, 开发不知道筛选要怎么落到 WHERE。
    negative_example:
      source_file: workspace-劳动仲裁/prd/劳动仲裁需求文档 v5.1.md
      section: 1.7 筛选规则 / 仲裁机构筛选联动
      snippet: |
        用户点击「仲裁机构」筛选器
        → 请求筛选条件接口（filter_type=arbitration_org）
        → 渲染一级列表（省级行政区/直辖市）
        → 用户选择一级 → 二级机构列表
        → 用户选择具体机构 → 作为筛选条件提交 → SQL WHERE arbitration_org = ?
      why_passes: 用户操作 → 接口 → 二级渲染 → SQL WHERE 全链路无断点。
    fire_when: PRD 含筛选/查询功能但用户操作到 SQL WHERE 之间有任一断点。
    dont_fire_when: 筛选追溯链完整, 或筛选直接是 select option 简单值。

  - id: RC-009
    name: 字段映射一致性
    severity: must
    description: 字段映射表中字段名与物理表 DDL 一致；跨表字段须标注 JOIN 来源和优先级。
    impact_score: 0.8
    positive_example:
      source_file: workspace-侵权软件/prd/未准入境需求文档-v1.0.md
      section: 全文 (24 个字段, 字段映射表与 DDL 不一致)
      snippet: |
        前端字段映射:
        | 商品名 | goods_title  | 进口商品名称 |
        | 数量   | qty          | 进口数量    |

        DDL: CREATE TABLE imports (
          product_name varchar(200),
          import_count int
        )
      why_fails: 字段映射表写 goods_title / qty, DDL 实际是 product_name / import_count, 字段名不一致, 开发跑 SQL 直接报错。
    negative_example:
      source_file: workspace-纳税人资质/prd/纳税人资质需求文档-v1.0.md
      section: 2.1 物理表 / 2.2 字段映射
      snippet: |
        CREATE TABLE ds_company_tax_state ( taxid varchar(20), stype tinyint, sdate date )

        | 纳税人识别号 | 主表.taxid  |
        | 纳税人资格类型 | 主表.stype |
        | 认定有效期起 | 主表.sdate  |
      why_passes: 映射表里的 taxid / stype / sdate 在 DDL 全部存在, 字段名一致。
    fire_when: 字段映射表中任一字段名在 DDL 中找不到, 或跨表字段未标 JOIN 来源。
    dont_fire_when: 映射 + DDL 字段名一致, 或 PRD 不含数据展示。

  - id: RC-010
    name: 数值类字段标注来源
    severity: must
    description: 数值类字段（分页数/导出上限/阈值）须标注来源或标注 TBD；跨表字段须说明空值降级处理。
    impact_score: 0.7
    positive_example:
      source_file: workspace-劳动仲裁/prd/劳动仲裁需求文档 v5.1.md
      section: 三、关联系统交付 / 3.3 单维度数据导出
      snippet: |
