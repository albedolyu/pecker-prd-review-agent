  - id: EV-04
    name: AI 特性 eval 集计划
    severity: must
    description: 涉及 AI/LLM/推荐/排序/智能匹配等特性时, PRD 须含评估集来源 / 主指标 / 回归触发三项。
    impact_score: 0.8
    positive_example:
      source_file: workspace-points-payment/prd/积分抵扣支付-v2.md
      section: 默认行为 / 兑换金额预填 (假设是 AI 推荐金额)
      snippet: |
        - 兑换弹窗预填金额: 按"恰好补足订单差额"向上取整到整元数
          (如订单 ¥3.90、余额 ¥2 → 预填 ¥2)
        (无: 评估集 / 主指标 / 回归触发)
      why_fails: 若 PM 后续把"预填金额"改成 AI 智能推荐, 则需 eval 集 + 指标 + 回归; 当前是规则引擎, 一旦切 AI 必须补。
    negative_example:
      source_file: workspace-劳动仲裁/prd/劳动仲裁需求文档 v5.1.md
      section: 1.6 默认排序规则
      snippet: |
        ### 1.6 默认排序规则

        | 数据类型              | 规则项   | 规则说明                     |
        | --------------------- | -------- | ---------------------------- |
        | 【劳动仲裁-送达公告】 | 默认排序 | 按照publish_date从晚到早排序 |
        | 【劳动仲裁-开庭公告】 | 默认排序 | 按照open_time从晚到早排序    |

        ### 1.7 筛选规则

        | 模块 | 筛选字段 | 层级 | 单选/多选 | 筛选项排序规则 | 规则说明 |
