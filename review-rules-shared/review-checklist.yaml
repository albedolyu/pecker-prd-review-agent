  - id: FN-01
    name: ds_risk_* 三段过滤约定
    severity: must
    description: 引用 ds_risk_* 表的 SQL/伪代码须含 entid > 0 / data_status = 0 / riskbird_status = 0 三段过滤。
    impact_score: 0.75
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 全文 (引用 ds_risk_court_mediation 但无三段过滤)
      snippet: |
        ## 二、需求详情

        ### 1. 诉前调解数据库设计

        诉前调解数据直接读取诉前调解表 (ds_risk_court_mediation)。
        立案信息仍读取ds_risk_court_lian表但要去除诉前调解数据。

        ### 2. 数据展示

        企业主页诉前调解列表页支持按"案由""案件状态""调解结果"筛选,
        筛选项与立案信息保持一致。
      why_fails: PRD 引用 ds_risk_court_mediation / ds_risk_court_lian 两张 ds_risk_* 表, 但全文未声明 entid > 0、data_status = 0、riskbird_status = 0 三段过滤的任一项, 开发漏过滤会混入企业关联数据 / 已删数据 / 风鸟不展示数据。
    negative_example:
      source_file: workspace-侵权软件/prd/未准入境需求文档-v1.0.md
      section: 1.2.1 通用规则 (合规真实例 + synthetic 补充枚举值表)
      snippet: |
        ### 1.2.1 通用规则

        | 规则项       | 规则说明                                        |
        | ------------ | ----------------------------------------------- |
        | 查询入口     | 从ds_risk_software_infringement_data表查询      |
        | 企业过滤     | entid= 查询企业的entid                          |
        | 主体过滤     | 只查询entid大于0的数据                          |
        | 数据状态过滤 | data_status = 0（只查有效数据）主表要符合本规则 |
        | 风鸟端过滤   | riskbird_status=0需要展示，为1不用展示          |

        ### 1.2.2 字段枚举值表

        | 字段 | 值 | 含义 |
        |------|----|------|
        | data_status | 0 | 有效 |
        | data_status | 1 | 已删除 |
        | riskbird_status | 0 | 风鸟展示 |
        | riskbird_status | 1 | 风鸟不展示 |

        ### 1.2.3 排序字段索引

        默认排序字段 publish_date 在 DDL 中已建索引 (idx_publish_date), 见 wiki/约束-未准入境DDL.md。
      why_passes: ds_risk_* 表三段过滤齐全 (entid>0 + data_status=0 + riskbird_status=0) + 完整枚举值表 + 排序字段索引声明, 满足 review-dimensions.yaml FN-01 全部 5 子项。前半部分 (1.2.1) 来自真实 PRD; 后半部分 (1.2.2/1.2.3 枚举与索引) 为合规拼接。
      synthetic: true
      synthetic_reason: 真实 PRD (8 个 workspace) 中 ds_risk_* 表三段过滤通常齐全, 但 review-dimensions.yaml 5 子项要求的 d) 完整枚举值表 + e) 排序字段索引声明在所有 PRD 中均缺失。为给 worker 完整合规样本以校准回归 baseline, 在真实 1.2.1 段后拼接 1.2.2/1.2.3 两段示意补充。
    fire_when: PRD 引用了 ds_risk_* 表但 SQL/伪代码/规则表未声明 entid / data_status / riskbird_status 三段过滤的任一项。
    dont_fire_when: PRD 不引用 ds_risk_* 表; 或者 entid/data_status/riskbird_status 三段过滤均已显式列出 (不要求枚举所有取值, 仅声明字段+条件即可)。
