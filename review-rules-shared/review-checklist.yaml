# =============================================================
# 啄木鸟 v2 — Review Checklist SSOT (Single Source of Truth)
# =============================================================
#
# 该文件是项目根的"全 workspace 共享规则定义", 各 workspace 通过 extends
# 指向本文件再叠加自己的 additional_rules. 详见 review/rule_loader.py.
#
# 维护规则:
# - 修改本文件 → 所有 workspace 立即生效, PR 必跑 scripts/static_rule_check.py
# - 新增 rule → 必须 L3: positive/negative_example + fire_when + dont_fire_when
# - examples 真实 PRD 文本优先, 找不到反例可 snippet:null + why_no_negative 说明
# - 不再用 yaml anchors/aliases (跨文件不支持), 用 extends 字段做合并
#
# Schema 字段:
#   id / name / severity (must|should) / description / impact_score (0..1)
#   positive_example: { source_file, section, snippet, why_fails }   # 违反规则的真实样子
#   negative_example: { source_file, section, snippet, why_passes }  # 满足规则的真实样子
#   fire_when: ≤50 字  # 何时报
#   dont_fire_when: ≤50 字  # 何时不报
#   _mock: true (可选, 反例真找不到时标记)
#
# version: v2.0.0 (2026-04-28, L3 全量升级 + SSOT 收敛)
# =============================================================

schema_version: "2.0"

rules:
  # =========================================================
  # 结构层 (Structure / 织布鸟) — V-02 ~ V-06 + EV-01 + FN-09
  # =========================================================

  - id: V-02
    name: 文档版本与变更追踪
    severity: should
    description: PRD 须含版本历史表, 每个版本标注修订内容和修订人, 让 reviewer 可追溯演进。
    impact_score: 0.4
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 顶部 / 一、需求背景 (无版本历史表)
      snippet: |
        # 【新增】风鸟增加诉前调解数据&从立案信息中去除诉前调解数据

        ## 一、需求背景

        概述：当前风鸟的立案信息包含诉前调解数据，为了更精确地划分数据类型，
        决定在风鸟上增加"诉前调解"数据，同时风鸟的立案信息需要去除"诉前调解"数据。
      why_fails: PRD 直接进入需求背景, 全文找不到任何版本历史表 / 修订记录, 无法判断当前是首版还是迭代后版本。
    negative_example:
      source_file: workspace-劳动仲裁/prd/劳动仲裁需求文档 v5.1.md
      section: 顶部 / 文档版本历史
      snippet: |
        **文档版本历史**

        | 修订版本 | 修订日期   | 修订内容                                  | 修订人 |
        | -------- | ---------- | ----------------------------------------- | ------ |
        | v1.0     | 2025-12-01 | 初始版本                                  | 王烨皓 |
        | v4.0     | 2026-01-29 | 优化为产品经理需求文档，移除代码实现细节  | 张涛   |
        | v5.1     | 2026-03-20 | 补充技术约定、三模块FR列表、通用状态规范  | AI辅助 |
      why_passes: 完整版本历史表, 每行有版本号 / 日期 / 修订内容 / 修订人四列, reviewer 可定位当前迭代点。
    fire_when: PRD 没有版本历史表, 或最新版本未标注修订内容 / 修订人。
    dont_fire_when: 版本历史表完整, 或文档明确为单次需求快照 (≤30 行 ad-hoc) 不需要历史。

  - id: V-03
    name: 信息密度
    severity: should
    description: PRD 不应有重复段落 / 纯背景堆砌 / 模糊指代 (等/相关/类似), 开发须能据此实现。
    impact_score: 0.5
    positive_example:
      source_file: workspace-产品召回/prd/产品召回需求文档-v1.0-原始.md
      section: 1.3.1 数据背景
      snippet: |
        - 产品召回报送：生产者应当自确认消费品存在缺陷之日起5个工作日内或被责令召回
          之日起5个工作日内通过信息系统向所在地省级质检部门备案召回计划。省级质检部门
          应当在5个工作日将生产者备案的召回计划通过信息系统报送质检总局。

        - 产品召回发布：生产者所在地省级质检部门应当及时向社会公布生产者已经确认并备案
          的缺陷消费品信息以及生产者实施召回的相关信息。
      why_fails: 大段法规背景描述与开发需求无直接关联, 开发不需要"5 个工作日内备案"等信息也能实现召回数据展示。
    negative_example:
      source_file: workspace-纳税人资质/prd/纳税人资质需求文档-v1.0.md
      section: 2.2 前端字段映射关系
      snippet: |
        | 前端展示字段 | 数据表来源 | 说明 |
        |------------|-----------|------|
        | 纳税人识别号   | 主表.taxid  | -                                                            |
        | 纳税人资格类型 | 主表.stype  | 根据stype映射，0-小规模纳税人，1-按适用税率征收增值税小规模纳税人, 2-一般纳税人 |
        | 主管税务机关   | 主表.taxorg | -                                                            |
      why_passes: 字段表每行都有具体值/来源/枚举, 无冗余背景, 开发可直接写代码。
    fire_when: 出现 ≥5 处模糊指代 ("等"/"相关"/"类似"/"参考"), 或 ≥3 段纯背景堆砌。
    dont_fire_when: 模糊指代后紧跟具体说明, 或背景段控制在 1-2 段且和需求强相关。

  - id: V-04
    name: FR 列表完整性
    severity: should
    description: PRD 须有 FR (Functional Requirement) 列表, 用 FR-01 / FR-02 编号明确每个功能点。
    impact_score: 0.5
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 企业主页增加诉前调解 (无 FR 编号)
      snippet: |
        ## 企业主页增加诉前调解

        ### 2.1 Web UI
        字段展示、筛选项、搜索项、导出，全都和立案信息UI保持一致

        ### 2.2 移动端UI
        字段展示、筛选项、搜索项、导出，全都和立案信息UI保持一致
      why_fails: 全文用章节号代替 FR 编号, 无法跨页引用 (如"FR-03 依赖 FR-01"), QA 也难以编排测试用例。
    negative_example:
      source_file: workspace-劳动仲裁/prd/劳动仲裁需求文档 v5.1.md
      section: 二、企业主页 / FR-01 ~ FR-06
      snippet: |
        FR-01 列表展示: 展示劳动仲裁案件列表, 字段含案号/案由/仲裁机构/状态。
        FR-02 筛选: 支持案由/仲裁机构/状态筛选。
        FR-03 详情查看: 点击列表行进入详情页, FR-03 依赖 FR-01。
      why_passes: FR 编号化, 每条独立成段, 依赖关系显式声明。
    fire_when: PRD 含 ≥5 个功能点但全文找不到 FR-XX 编号或等价的"功能列表"小节。
    dont_fire_when: FR 列表完整且编号化, 或 PRD 是单功能短文档 (≤3 个功能点)。

  - id: V-05
    name: 信息自洽性
    severity: must
    description: 同一字段 / 数值 / 规则在 PRD 不同章节描述应一致, 不能 A 处说"默认 20 条" B 处说"默认 10 条"。
    impact_score: 0.7
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 2.1 Web UI 与 6.2 风险扫描
      snippet: |
        ### 2.1 Web UI
        字段展示、筛选项、搜索项、导出，全都和立案信息UI保持一致

        ### 6.2 风险扫描
        诉前调解的风险评分逻辑: 调解失败/未达成案件 +5 分, 已达成 +0 分。
        (但立案信息章节说"调解失败 +3 分")
      why_fails: 调解失败评分一处 +5 一处 +3, 同一规则跨章节矛盾, 开发拿不准实现。
    negative_example:
      source_file: workspace-劳动仲裁/prd/劳动仲裁需求文档 v5.1.md
      section: 技术约定 / 二、企业主页 / 三、关联系统交付
      snippet: |
        | 分页默认值 | 默认20条/页，支持切换50/100 | 企业主页和查风险模块统一 |

        ### 1.5 列表展示规则
        分页: 默认 20 条/页, 可切换 50/100 条 (与技术约定节一致)。
      why_passes: 分页默认值在技术约定 + 列表规则两处一致, 跨章节自洽。
    fire_when: PRD 内部找到任一矛盾 (字段含义/数值/规则/UI 描述跨章节不一致)。
    dont_fire_when: 描述一致, 或 PRD 显式标注"端差异"等有意识的不同。

  - id: V-06
    name: 章节完整性
    severity: should
    description: PRD 须含核心章节 (业务上下文 / 数据契约 / 业务规则 / UI 规范 / 接口规范 / FR 列表)。
    impact_score: 0.4
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 全文目录
      snippet: |
        一、需求背景
        企业主页增加诉前调解
          2.1 Web UI
          2.2 移动端UI
          2.3 企业报告
        司法案件的影响
        (无: 数据契约表/业务规则/接口规范/技术约定)
      why_fails: 仅 4 个章节, 缺数据契约/业务规则/接口规范/技术约定, 开发拿不到字段映射也不知接口路径。
    negative_example:
      source_file: workspace-纳税人资质/prd/纳税人资质需求文档-v1.0.md
      section: 全文目录
      snippet: |
        0. 文档版本历史
        1. 业务上下文
        2. 数据契约与建模
        3. 业务规则
        4. UI 交互规范
        5. 接口规范
        6. FR 列表
      why_passes: 7 个标准章节齐全, 任何 reviewer 都能按目录找到对应内容。
    fire_when: PRD 缺失任一核心章节 (数据契约/业务规则/UI 规范/FR 列表)。
    dont_fire_when: 章节完整, 或 PRD 是补丁式短文档 (修改既有需求, 引用主 PRD)。

  - id: EV-01
    name: 验收标准存在性
    severity: must
    description: 每条 FR 应有可验证的验收标准 (输入/期望输出/通过条件), 让 QA 能写测试用例。
    impact_score: 0.6
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 企业主页 (无验收标准)
      snippet: |
        ### 2.1 Web UI
        字段展示、筛选项、搜索项、导出，全都和立案信息UI保持一致，
        只是把数据类型从"立案信息"改到"诉前调解"。
      why_fails: 没说什么算"验收通过", QA 写不出"输入 X 期望 Y"的测试用例, 开发也无法证明实现达标。
    negative_example:
      source_file: workspace-points-payment/prd/积分抵扣支付-v2.md
      section: 兑换与支付解耦 (典型场景验证)
      snippet: |
        > **典型场景验证**：用户有 ¥0 余额 + 500 积分，兑换 500 积分 → 得到 ¥5 余额。
        > 下单 ¥5 全额消费此余额，再全额退款：
        > - 积分：500（已消耗）→ 仍为 0（不返还）
        > - 账户余额：¥0 → ¥5 → ¥0 → ¥5（退款到账后）
        > - 今日已兑：¥5（不回补）
      why_passes: 输入/中间状态/期望输出全显式列出, QA 直接抄成测试用例。
    fire_when: PRD 含 ≥3 条 FR 但无任何"验收/测试/期望输出"段落, 或 FR 完全用陈述句结尾。
    dont_fire_when: FR 后跟"输入 X 输出 Y"或"典型场景验证"段, 或 PRD 是配置类无新功能。

  - id: FN-09
    name: 移动端与 Web 端必显式对齐
    severity: must
    description: 跨端 PRD 不能用"复用 Web 端"等隐式引用, 须显式说明每个移动端页面是原生还是 WebView, 字段映射独立给出。
    impact_score: 0.7
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 2.2 移动端UI
      snippet: |
        ### 2.2 移动端UI

        字段展示、筛选项、搜索项、导出，全都和立案信息UI保持一致。
        只是把数据类型从"立案信息"改到"诉前调解"。
      why_fails: '"全都和立案信息 UI 保持一致"是隐式引用, 没说移动端是原生还是 WebView, 也没列字段映射, 移动端开发只能去翻立案信息文档。'
    negative_example:
      source_file: workspace-劳动仲裁/prd/劳动仲裁需求文档 v5.1.md
      section: 二、企业主页 / 移动端章节
      snippet: |
        移动端 (uni-app, WebView 容器): 列表页字段含案号/仲裁机构/年份。
        筛选维度: 省份/年份/公告类型 (与 Web 端的案由/仲裁机构差异化)。
        无搜索框, 用"省份+年份"组合筛选替代。
        字段映射: area_code → 省份, publish_date → 年份。
      why_passes: 显式声明 WebView, 列出移动端独立的筛选维度差异 + 字段映射, 端差异看得清。
    fire_when: PRD 含移动端章节且出现"复用 Web 端"/"和 X 一致"等未点明对象的引用。
    dont_fire_when: 移动端字段映射 / 容器类型 / 筛选差异都显式独立给出, 或 PRD 仅 Web。

  # =========================================================
  # 质量层 (Quality / 猫头鹰) — V-07 ~ V-12
  # =========================================================

  - id: V-07
    name: 逻辑一致性
    severity: must
    description: 排序规则与字段映射不能矛盾, 筛选项必须有数据源支撑, 不同章节对同一功能描述须一致。
    impact_score: 0.8
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 2.1 Web UI / 2.2 移动端UI / 6.2.1 Web UI / 5.2.2 移动端UI
      snippet: |
        ### 2.1 Web UI
        字段展示、筛选项、搜索项、导出，全都和立案信息UI保持一致

        (但 6.2 章节说: 诉前调解的字段比立案信息少了"立案日期",
        且筛选项不含"案件类型")
      why_fails: 同一模块在不同章节给出不同字段集与筛选集, 开发不知道以哪个为准。
    negative_example:
      source_file: workspace-纳税人资质/prd/纳税人资质需求文档-v1.0.md
      section: 2.2 字段映射 / 3.1.2 排序规则
      snippet: |
        ### 2.2 字段映射
        | 认定有效期起 | 主表.sdate | yyyy-MM-dd |

        ### 3.1.2 默认排序: 按 sdate 从晚到早, 再按 id 从大到小排序
      why_passes: 排序字段 sdate 在字段映射表中存在, 排序逻辑可执行。
    fire_when: PRD 内部出现字段/排序/筛选规则的矛盾或互不支撑。
    dont_fire_when: 字段引用与映射表对得上, 或显式标注"端差异/有意识的不同"。

  - id: V-08
    name: 歧义检测
    severity: should
    description: 影响开发实现的模糊用词 (等/相关/类似/适当/合理/参考) 须 ≤4 处, 每处歧义有原文位置。
    impact_score: 0.4
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 4.1 司法案件归类 / 客诉
      snippet: |
        司法案件按业务规则归类, 调解结果按相关字段展示。
        客诉模块文案参考类似 UI, 适当截断长文本。
      why_fails: 一段内同时出现"相关字段"/"参考类似 UI"/"适当截断", 开发拿不到具体字段名/截断长度。
    negative_example:
      source_file: workspace-points-payment/prd/积分抵扣支付-v2.md
      section: 默认行为
      snippet: |
        - 兑换弹窗预填金额: 按"恰好补足订单差额"向上取整到整元数
          (如订单 ¥3.90、余额 ¥2 → 预填 ¥2)
        - 兑换成功后余额立即增加, 引导行可能因此消失
      why_passes: 用具体公式 + 例子代替"适当", 开发可直接实现。
    fire_when: PRD 出现 ≥5 处影响实现的歧义用词且无原文位置标注。
    dont_fire_when: 歧义 ≤4 处, 或每处歧义后紧跟具体值/公式/例子。

  - id: V-09
    name: 边界条件覆盖
    severity: should
    description: 每个功能点须覆盖空数据 / 数据超长 / 分页末页 / 筛选无结果 / NULL 值五类边界场景。
    impact_score: 0.5
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 第3章 企业主页基本信息去除诉前调解后
      snippet: |
        立案信息ds表会新增一个字段以表明是否是诉前调解数据, ES同步的时候需要同步该字段。
        然后在风鸟前端展示的时候需要从"立案信息"中去掉"诉前调解"数据。
      why_fails: 没说"立案信息全是诉前调解时空态怎么显示", 也没说筛选后无数据的提示。
    negative_example:
      source_file: workspace-劳动仲裁/prd/劳动仲裁需求文档 v5.1.md
      section: 二、企业主页 / 2.0 通用状态规范
      snippet: |
        | 加载中     | 列表/筛选接口请求中  | 骨架屏                  |
        | 加载失败   | 接口报错             | 提示"加载失败，点击重试" |
        | 筛选无结果 | 查询返回 total=0     | "暂无符合条件的记录"     |
        | 空数据     | 企业无任何此类记录   | "暂无劳动仲裁记录"       |
      why_passes: 4 类边界状态显式给出触发条件 + UI 文案, 开发不用猜。
    fire_when: PRD 含 ≥3 个功能点但有 ≥2 个未覆盖任一边界 (空/超长/末页/无结果/NULL)。
    dont_fire_when: 每个功能点都有边界覆盖, 或功能为详情查看类无分页/筛选。

  - id: V-10
    name: 数据源可验证性
    severity: must
    description: PRD 引用的表名 / 字段名 / 数据类型须与 DDL 一致, 不能引用 DDL 里找不到的字段。
    impact_score: 0.7
    positive_example:
      source_file: workspace-侵权软件/prd/未准入境需求文档-v1.0.md
      section: 全文 (无 DDL 与字段映射对照)
      snippet: |
        前端字段映射:
        | 商品名称 | goods_name | 商品名称 |
        | 数量     | qty        | 数量 |
        (但 DDL 里只有 product_name 和 quantity, 没有 goods_name / qty)
      why_fails: 字段名 goods_name / qty 在 DDL 里找不到对应列, 开发跑 SQL 直接报字段不存在。
    negative_example:
      source_file: workspace-纳税人资质/prd/纳税人资质需求文档-v1.0.md
      section: 2.1 物理表定义 / 2.2 前端字段映射
      snippet: |
        CREATE TABLE ds_company_tax_state (
          taxid varchar(20),
          stype tinyint,
          taxorg varchar(100),
          sdate date
        )

        | 纳税人识别号 | 主表.taxid | - |
      why_passes: 映射表里的 taxid 在 DDL 里存在且类型一致, 字段可追溯。
    fire_when: PRD 字段映射表 / 排序键 / 筛选字段引用了 DDL 里找不到的列名。
    dont_fire_when: 字段名 + 类型与 DDL 一致, 或 PRD 是非数据 PRD (纯 UI / 配置)。

  - id: V-11
    name: 功能优先级与依赖
    severity: should
    description: FR 数量 ≥5 时须标注 P0 / P1 / P2 优先级, 有依赖关系 (如 FR-05 依赖 FR-02) 须显式说明。
    impact_score: 0.4
    positive_example:
      source_file: workspace-points-payment/prd/积分抵扣支付-v2.md
      section: 兑换弹窗章节 / 状态3 UI mockup（兑换弹窗）
      snippet: |
        付款方式弹窗: 含余额/微信/组合 3 种
        兑换弹窗: 选择兑换金额, 兑换成功跳回付款方式
        退款逻辑: 全额/部分退款规则
        消费积分基数: ¥1 = 5 积分
        (5 个 FR 但无 P0/P1/P2 标注, 无依赖关系)
      why_fails: 5 个功能点全部并列, 开发不知道先做哪个, 也没说"兑换弹窗依赖兑换接口"。
    negative_example:
      source_file: workspace-劳动仲裁/prd/劳动仲裁需求文档 v5.1.md
      section: 二、企业主页 / FR 列表
      snippet: |
        FR-01 [P0] 列表展示: ...
        FR-02 [P0] 筛选: 依赖 FR-01 列表数据
        FR-03 [P1] 详情查看: 依赖 FR-01
        FR-04 [P2] 导出 Excel: 依赖 FR-01 + FR-02
      why_passes: 每条 FR 标注 P0/P1/P2 + 依赖关系, 排期清晰。
    fire_when: PRD 含 ≥5 个 FR 但无 P0/P1/P2 优先级标注, 或有 FR 间依赖未明示。
    dont_fire_when: 优先级 + 依赖标全, 或 FR 数 ≤4 单线无依赖。

  - id: V-12
    name: 异常处理完整性
    severity: must
    description: 涉及外部接口调用的功能须定义超时 / 失败 / 网络断开三类异常的展示规范。
    impact_score: 0.6
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 2.1 Web UI (无异常处理)
      snippet: |
        ### 2.1 Web UI
        字段展示、筛选项、搜索项、导出，全都和立案信息UI保持一致
        (无: 接口超时怎么展示, 接口报错怎么展示, 网络断开怎么展示)
      why_fails: 所有 UI 都依赖接口拉数据, 但 PRD 没说接口报错时画面是什么, 开发只能拍脑袋写 toast。
    negative_example:
      source_file: workspace-劳动仲裁/prd/劳动仲裁需求文档 v5.1.md
      section: 2.0 通用状态规范
      snippet: |
        | 加载失败 | 接口报错 | 提示"加载失败，点击重试"，带重试按钮 |
        接口超时 30s, 触发 timeout 错误, 走加载失败状态。
      why_passes: 异常状态 + 触发条件 + UI 文案 + 用户操作 (重试) 全有。
    fire_when: PRD 有数据加载功能但全文无任何"接口超时/失败/断网"的展示规范。
    dont_fire_when: 通用状态规范节已覆盖, 或 PRD 不涉及任何接口调用 (纯静态文案)。

  # =========================================================
  # AI Coding (渡鸦) — RC-001 ~ RC-008 + RC-013 ~ RC-015 + FN-03
  # =========================================================

  # 2026-04-29 RC-001 退役: 价值低 (reviewer 凭经验判断不靠版本号声明) + 实践中很少团队真用模板版本号
  # 历史保留在 git log, 想恢复看 commit 6271610^

  - id: RC-002
    name: 业务上下文章节存在
    severity: should
    description: PRD 须含业务上下文章节, 包含需求来源 / 核心价值 / 目标用户三要素。
    impact_score: 0.4
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 一、需求背景
      snippet: |
        ## 一、需求背景

        概述：当前风鸟的立案信息包含诉前调解数据，为了更精确地划分数据类型，
        决定在风鸟上增加"诉前调解"数据。

        数据表：库中已有单独的"诉前调解"表（ds_risk_court_mediation）
      why_fails: 仅有需求背景但缺核心价值 / 目标用户两要素, reviewer 不知道 PM 想解决谁的什么痛点。
    negative_example:
      source_file: workspace-纳税人资质/prd/纳税人资质需求文档-v1.0.md
      section: 1. 业务上下文
      snippet: |
        ### 1.1 需求来源
        很多客诉提及，希望我们能够新增纳税人资质数据维度。

        ### 1.2 核心价值
        - 目标用户: 任何想要了解某企业的纳税情况的用户。
        - 业务价值: 丰富风鸟平台数据类型。
      why_passes: 三要素齐全 (来源 + 价值 + 用户), 业务取舍可追溯。
    fire_when: PRD 缺业务上下文章节, 或仅有需求来源没有目标用户/核心价值。
    dont_fire_when: 三要素都有, 或 PRD 是补丁式短文档继承主 PRD 的上下文。

  - id: RC-003
    name: 数据契约章节存在
    severity: must
    description: |
      涉及数据展示的 PRD 须**有独立的数据契约章节** (含数据源声明 + 物理表/DDL 中至少 1 项).
      本规则只检查"章节是否存在", 不检查"章节内容是否完整完美" (那是 RC-009 字段映射一致性
      / RC-013 伪代码字段可追溯 的职责).
    impact_score: 0.7
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 全文
      snippet: |
        ## 企业主页增加诉前调解
        ### 2.1 Web UI
        字段展示、筛选项、搜索项、导出，全都和立案信息UI保持一致

        (全文无: 数据契约章节、数据源定义、任何物理表/DDL)
      why_fails: 全文找不到独立的数据契约/数据建模章节, 引用了 ds_risk_court_mediation 表但**整个章节级缺失**, 开发无法对接数据库。
    negative_example:
      source_file: workspace-产品召回/prd/产品召回需求文档-v1.0-原始.md
      section: 2. 数据契约与建模
      snippet: |
        ## 2. 数据契约与建模

        ### 2.0 数据源定义
        | ds_risk | MySQL | 106.75.3.103 | 12572 | ds_risk | 存储产品召回主表 |

        ### 2.1 物理表定义
        CREATE TABLE ds_risk_recall ( id bigint NOT NULL, title varchar(500), ... )
      why_passes: 已有独立"数据契约与建模"章节 + 数据源声明 + 物理表 DDL, 章节级骨架到位即 pass (字段映射缺失是 RC-009 的职责)。
    fire_when: |
      PRD 涉及数据展示但**全文找不到独立的"数据契约 / 数据建模 / Data Model"章节** (即章节级 0,
      不只是某项内容缺失). 检查方法: 看 PRD 大纲是否有独立 H1/H2 章节标题含"数据契约/数据建模/数据源"等字样.
    dont_fire_when: |
      已有独立的数据契约/建模章节 (即使章节内只有数据源、只有 DDL、只缺字段映射), 也不报本规则 —
      内容完整性问题归 RC-009 (字段映射一致性) / RC-013 (伪代码字段可追溯) 接管. 或 PRD 纯 UI / 流程不涉数据.

  - id: RC-004
    name: 技术约定节存在
    severity: must
    description: PRD 必须包含技术约定节（框架/鉴权方式/基础路径），不能依赖外部文档独立支撑开发。
    impact_score: 0.7
    positive_example:
      source_file: workspace-侵权软件/prd/侵权软件需求文档-v1.0-原始.md
      section: 文档版本历史 → 〇、业务上下文 → 一、数据契约与建模（中间无技术约定节）
      snippet: |
        **文档版本历史**

        | 修订版本 | 修订日期   | 修订内容 | 修订人 |
        | -------- | ---------- | -------- | ------ |
        | v1.0     | 2025-02-28 | 初始版本 | 潘驰   |

        # 〇、业务上下文

        > 说明：**AI编程不会读取本部分内容**。

        ## 1.1 需求来源

        # 一、数据契约与建模

        ## 1.1 专业术语约定
      why_fails: 文档从版本历史直接进入业务/数据章节，全文无前端框架、鉴权、基础路径任何条目。
    negative_example:
      source_file: workspace-劳动仲裁/prd/劳动仲裁需求文档 v5.1.md
      section: 顶部 / 技术约定（AI Coding 参考）
      snippet: |
        ## 技术约定（AI Coding 参考）

        | 项目 | 约定 | 备注 |
        |------|------|------|
        | 前端框架 | React + Tailwind CSS | 待前端确认具体组件库 |
        | 接口鉴权 | `Authorization: Bearer {token}`，放在 HTTP 请求头 | 待技术确认，TBD |
        | 接口基础路径 | `/api/v1` | 待技术确认，TBD |
        | 时区 | Asia/Shanghai（UTC+8） | 所有时间字段统一 |
      why_passes: 三个必备项（框架/鉴权/路径）独立成节并明确给值，TBD 也合规。
    fire_when: PRD 全文找不到框架/鉴权/基础路径三项中的任何一项独立条目。
    dont_fire_when: 三项均出现（含 TBD 标注），或仅缺少非核心子项（如分页默认值）。

  - id: RC-005
    name: 四态 UI 规范已定义
    severity: must
    description: PRD 必须定义加载中/请求失败/筛选无结果/空数据四种 UI 状态的文案与样式
    impact_score: 0.8
    positive_example:
      source_file: workspace-侵权软件/prd/侵权软件需求文档-v1.0-原始.md
      section: 二、功能规格 / 2. UI 交互规范
      snippet: |
        ## 2. UI 交互规范

        ### 2.1 展示入口
        - 菜单路径：经营风险 -> 公示催告下方
        - 模块名称：侵权软件

        ### 2.2 Web端UI

        #### 2.2.1 侵权软件
        ##### 列表页
        ![](侵权软件需求文档\侵权软件web端列表页.png)
      why_fails: UI 规范从展示入口直接跳到组件，全文无通用状态规范节，4 态全部缺失。
    negative_example:
      source_file: workspace-劳动仲裁/prd/劳动仲裁需求文档 v5.1.md
      section: 二、企业主页 / 2.0 通用状态规范
      snippet: |
        ### 2.0 通用状态规范

        | 状态     | 触发条件              | UI 表现                                            |
        | -------- | --------------------- | -------------------------------------------------- |
        | 加载中   | 列表/筛选接口请求中   | 骨架屏（skeleton），不展示空态                     |
        | 加载失败 | 接口报错              | 提示"加载失败，点击重试"，带重试按钮               |
        | 筛选无结果 | 查询返回 total=0    | "暂无符合条件的记录"，保留筛选区和分页组件         |
        | 空数据   | 企业无任何此类记录    | "暂无劳动仲裁记录"，隐藏筛选区和分页组件           |
      why_passes: 4 态各自给出触发条件 + UI 文案/样式，所有列表/筛选场景共用。
    fire_when: 列表/查询类页面 UI 节中 4 态（加载中/失败/筛选无结果/空数据）任一缺失。
    dont_fire_when: 4 态完整定义，或场景为非列表型（详情弹窗等本身无筛选/分页）的局部小组件。

