        * 支持维度数据导出
        * 导出字段与列表页字段保持一致
        * 导出格式：Excel（.xlsx）
        * 导出上限：单次最多10,000条，超出时提示用户缩小筛选范围
        * 权限要求：需登录态，非登录用户不展示导出按钮
      why_fails: '「10,000 条」是硬数值阈值，未标注来源（产品决策？技术限制？）也未标 TBD。'
    negative_example:
      source_file: workspace-对外投资/prd/数据维度-对外投资增加间接投资_原始版本.md
      section: 五、其他 / 5.2 数据导出
      snippet: |
        ### 5.2 数据导出

        - web端支持维度数据导出
        - 导出字段与列表页字段保持一致
        - 单次导出上限：[TBD，请确认实际上限] 条
        - 列表分页：每页默认 20 条，支持切换 50 / 100 条（[TBD，请与现有模块保持一致]）
      why_passes: 两个数值阈值均显式标注 [TBD]，符合规则的"或标注 TBD"。
    fire_when: PRD 出现具体数字（导出上限/分页/阈值/页大小等）但既无来源说明也无 TBD 标注。
    dont_fire_when: 数值带来源（"对齐企业主页统一规格"、引用既定决策）或显式标注 TBD/待技术确认。

  - id: RC-013
    name: 伪代码字段可追溯
    severity: must
    description: 伪代码中每个字段均可在 DDL 中找到；跨表字段标注 JOIN 来源
    impact_score: 0.6
    positive_example:
      source_file: workspace-对外投资/prd/数据维度-对外投资增加间接投资_原始版本.md
      section: 三、业务规则 / 3.6 筛选规则 / 二级行业筛选构建逻辑（伪代码）
      snippet: |
        ```python
        industry_options = []
        for company in current_list:
            level1 = company.nic_id_cn_level1  # 一级行业
            level2 = company.nic_id_cn_level2  # 二级行业（可为空）
            add_if_not_exists(industry_options, level1)
            if level2:
                add_if_not_exists(industry_options, level2)
        ```
      why_fails: 伪代码用 nic_id_cn_level1/level2，但 DDL 只有 nic_id 与 nic_id_cn，两个 _level 字段在任何建表语句中都查不到。
    negative_example:
      source_file: workspace-劳动仲裁/prd/劳动仲裁需求文档 v5.1.md
      section: 二、企业主页 / 1.7 筛选规则 / 仲裁机构筛选联动逻辑
      snippet: |
        用户点击「仲裁机构」筛选器
        → 请求筛选条件接口（filter_type=arbitration_org）
        → 渲染一级列表（省级行政区/直辖市）
        → 用户选择一级
          → 若为直辖市（area_code 前 2 位为 11/12/31/50）展示二级机构列表
          → 若为省级展示二级地级市，再选展示三级机构列表
        → 用户选择具体机构 → 作为筛选条件提交查询
      why_passes: 引用的 area_code 在主表 DDL 已定义，filter_type 在 2.5.3 接口入参定义，每个字段可追溯。
    fire_when: PRD 含伪代码/SQL/算法块，且其中至少一个字段在物理表 DDL/接口出入参表中找不到对应。
    dont_fire_when: 字段在 DDL 找得到，或属于业务变量名（如 industry_options、level1）非数据字段。

  # 2026-04-29 RC-014 退役: 与 RC-008 (筛选追溯完整) 内容重复, review-dimensions.yaml
  # 2026-04-26 sprint Day3 已删 owner. SQL WHERE 落点的检查由 RC-008 + RC-013 (伪代码字段可追溯) 共同覆盖.

  - id: RC-015
    name: 非常规逻辑有示例
    severity: should
    description: 非常规逻辑（继承/降级/空值）须有具体示例覆盖。
    impact_score: 0.5
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 第3章 企业主页基本信息去除诉前调解后
      snippet: |
        立案信息ds表会新增一个字段以表明是否是诉前调解数据,
        ES同步的时候需要同步该字段。
        然后在风鸟前端展示的时候需要从"立案信息"中去掉"诉前调解"数据。
        (无: 字段空值时的降级 / 字段同步失败的处理 / 历史数据迁移示例)
      why_fails: 引入新字段但没给空值处理 (老数据该字段为 NULL 怎么算)、迁移失败处理示例。
    negative_example:
      source_file: workspace-points-payment/prd/积分抵扣支付-v2.md
      section: 退款逻辑 / 典型场景验证
      snippet: |
        > **典型场景验证**：用户有 ¥0 余额 + 500 积分，兑换 500 积分 → 得到 ¥5 余额。
        > 下单 ¥5 全额消费此余额，再全额退款：
        > - 积分：500（已消耗）→ 仍为 0（不返还）
        > - 账户余额：¥0 → ¥5 → ¥0 → ¥5（退款到账后）
        > - 今日已兑：¥5（不回补）
      why_passes: 退款这种非常规逻辑用具体数值场景给出, 边界情况 (额度池不回补) 显式说明。
    fire_when: PRD 提到继承/降级/空值/迁移等非常规逻辑但无任何具体场景示例。
    dont_fire_when: 至少 1 个非常规逻辑配数值示例, 或 PRD 仅含常规增删改查逻辑。

  - id: FN-03
    name: 风鸟鉴权与基础路径硬约定
    severity: must
    description: 风鸟接口鉴权须为 Bearer JWT, 基础路径须为 /api/v1/<module>/*, 不允许 TBD。
    impact_score: 0.7
    positive_example:
      source_file: workspace-劳动仲裁/prd/劳动仲裁需求文档 v5.1.md
      section: 技术约定 (含 TBD)
      snippet: |
        | 接口鉴权     | `Authorization: Bearer {token}`，放在 HTTP 请求头 | 待技术确认，TBD |
        | 接口基础路径 | `/api/v1`                                          | 待技术确认，TBD |
      why_fails: 鉴权与基础路径都标了 TBD, FN-03 在风鸟领域要求显式给值不能 TBD (与 RC-004 协同, RC-004 允许 TBD, FN-03 严)。
    negative_example:
      source_file: workspace-对外投资/prd/数据维度-对外投资增加间接投资_原始版本.md
      section: 技术约定 (Technical Conventions)
      snippet: |
        ## 技术约定 (Technical Conventions)

        | 约定项 | 说明 |
        |--------|------|
        | 前端框架 | React + Tailwind CSS |
        | 接口鉴权方式 | JWT（Bearer Token） |
        | 接口基础路径 | /api/v1 |
        | 数据读取方式 | 所有数据走 ES，不直接查 MySQL/PostgreSQL |
        | 分页方式 | page / pageSize 参数，默认 pageSize=20 |
      why_passes: 接口鉴权方式显式写"JWT（Bearer Token）"且不带 TBD/待确认; 接口基础路径直给 "/api/v1" 而非占位符 — 完全符合 FN-03 dont_fire_when。
    _mock: false
    fire_when: PRD 鉴权/基础路径有"TBD"/"待确认", 或路径无模块前缀 (如 /xxx/* 占位符)。
    dont_fire_when: 鉴权显式 Bearer JWT 不带 TBD, 路径以 /api/v1/<module>/ 开头。

  - id: RC-011
    name: 接口路径与字段名存在
    severity: must
    description: |
      涉及接口的 PRD 必须给出**接口路径 + 入参字段名清单 + 出参字段名清单**三件套。
      本规则**仅且仅**检查这三件是否存在, 不检查任何其他: 类型/必填/枚举值/错误码/分页边界/校验规则
      都不归本规则管, 即使全部缺失只要三件套齐全就 PASS。其他细节由 RC-013 (伪代码字段可追溯) 接管。
    impact_score: 0.65
    positive_example:
      source_file: workspace-fengniao-mediation/prd/风鸟-诉前调解-v1.md
      section: 全文 (无接口规范章节)
      snippet: |
        诉前调解数据直接读取诉前调解表。
        立案信息仍读取ds_risk_court_lian表但要去除诉前调解数据。
        (全文找不到任何 GET/POST/接口规范/API 章节)
      why_fails: 隐含至少 2 个接口 (列表 / 详情) 但 PRD **章节级完全没接口规范**, 前后端联调全靠口头对齐。
    negative_example:
      source_file: workspace-劳动仲裁/prd/劳动仲裁需求文档 v5.1.md
      section: 2.5 API 接口规范 / 2.5.1 送达公告列表
      snippet: |
        ### 2.5 API 接口规范

        > 接口鉴权统一使用 `Authorization: Bearer {token}`,以下接口均需鉴权.

        #### 2.5.1 送达公告列表

        GET /api/v1/labour-arbitration/delivery/list

        入参:
          entid            long    必填  企业ID
          page             int     必填  页码,从1开始
          page_size        int     必填  每页条数,默认20,可选50/100
          arbitration_org  string  选填  仲裁机构筛选(机构名称)
          keyword          string  选填  搜索关键词(模糊匹配案号/当事人/仲裁机构/案由)
          sort_order       string  选填  排序方向: desc(默认)/asc,按publish_date排序

        出参:
          total            int     总记录数
          list[]:
            table_id          long    主表ID
            case_code         string  案号
            applicants        string  申请人(多人顿号分隔,已脱敏)
            arbitration_org   string  仲裁机构(空值返回"-")
            publish_date      string  发布日期 yyyy-MM-dd
      why_passes: 独立"API 接口规范"章节 + 接口路径 + 完整入参出参 (字段名 + 类型 + 必填 + 含义), 接口契约完整, 前后端可独立开发。
    fire_when: PRD 涉及接口, 但**接口路径 + 入参字段名 + 出参字段名**三件套中有任一完全没有。
    dont_fire_when: 三件套都有 (即使缺类型/必填/枚举/错误码/分页边界/校验等任何细节, 都不报本规则, 那些归 RC-013); 或 PRD 不涉及接口。

