# 啄木鸟评审维度配置
# PM 可在 Obsidian 中编辑此文件，修改规则、调整权重、禁用特定规则
# workspace 本地副本（workspace/review-rules/review-dimensions.yaml）可覆盖全局配置
#
# 缺失 ② Worker 边界互斥 (rule-level owner):
# 每条 rule 的 owner 字段决定哪个 worker 唯一负责。worker 严格只输出 owner=自己
# 的 rule 的 fail,即使看到其他维度的 rule 违反也禁止报告。这是从软约束(prompt 指引)
# 升级为硬约束(显式 owner 字段)的关键。冷规则可由 rule_coverage_matrix 暴露并清退。

dimensions:
  structure:
    name: "结构层"
    codename: "织布鸟"
    model: "sonnet"
    wiki_keywords: ["模板", "格式", "规范", "brief", "结构", "追溯", "版本", "目录"]
    rules: |
      逐条检查以下 5 项，每条都必须给出 pass 或 fail 判定：

      V-02 文档版本与变更追踪：
        检查项：PRD 是否有版本历史表？每个版本是否标注了修订内容和修订人？
        fail 条件：无版本历史表，或最新版本未标注修订内容。
        severity: should

      V-03 信息密度（**逐段扫描, 见到长背景段必报**）：
        # 2026-04-30 强化: 原 prompt 太抽象, worker 在批量 29 条规则里注意力分散漏报.
        # 加典型违规信号 + 触发关键词清单, 让 worker 一眼识别.
        逐段扫描 PRD, 任一段满足以下条件即必报本规则 (不要因为 PRD 整体 OK 就放过):

        反模式 1 — 单段法规/政策背景堆砌 (最常见, 必报):
          - 单段 ≥80 字 + 段内**无字段名 / 接口名 / UI 元素 / SQL**;
          - 段内含 "应当 / 不少于 / 自...之日起 / 通过信息系统 / 报送 / 备案 /
            根据...规定 / 第X条" 等法规化表述;
          - 例: "生产者应当自确认消费品存在缺陷之日起5个工作日内或被责令召回之日起
            5个工作日内通过信息系统向所在地省级质检部门备案召回计划" → 必报.

        反模式 2 — 模糊指代 (worker 常见漏报, 主动找):
          - "等" / "相关" / "类似" / "参考" 后无具体说明, 出现 ≥5 处必报.

        反模式 3 — 同一信息跨章节重复:
          - 同一概念在 ≥2 个章节出现, 没有新增信息.

        反模式 4 — 无功能/字段绑定的纯描述段:
          - 段内全是描述性文字, 没有任何"做什么 / 取哪个字段 / 哪个 UI" 的具体信息.

        fail 条件: 命中任一反模式即报.
        反例 (worker 不要报): 背景段 ≤2 段且与功能强相关 (如解释字段为何要某种处理),
        或模糊指代后紧跟具体说明.
        severity: should

      V-04 功能清单完整性：
        # 2026-04-26 sprint Day3 REWRITE: 原 "FR 列表完整性" 假设 FR-XX 命名过强,
        # 实际很多团队不用 FR 编号 (用 PRD-001/REQ-1 / 1.1 章节号 / bullet 列表). 改为通用版.
        检查项：PRD 是否有"功能清单"或等价的可寻址结构? 每条功能能被开发独立查到?
        - 接受任何编号体系 (FR-01 / PRD-001 / REQ-1 / 1.1 章节 / bullet)
        - 接受 markdown table / 编号列表 / 章节嵌套 任一组织方式
        - 关键: 每条功能要有"位置标识符" (编号或章节号), 让代码 review 能精确引用
        fail 条件：(a) PRD 描述了功能但没编号或位置标识, 开发难以引用追踪;
        或 (b) 有清单但漏了文档中描述的功能点。severity: must

      V-05 信息自洽性：
        # 2026-04-26 sprint Day3 REWRITE: 实测 P=0.33 / reject 67%, 模板化命名差异被误报多.
        # 此规则是 sprint 核心卖点 (跨章节一致性), 必须保留 must, 但 prompt 加精度提示.
        检查项：PRD 内部引用是否**语义自洽**？只报"语义对立矛盾", **不报**纯命名差异。

        必须报 (语义矛盾):
        - 同一概念两处描述对立 (A 章"按时间降序", B 章"按发布日期升序" — 顺序对立)
        - 字段引用与数据源定义矛盾 (A 章"按地区筛选"但 DDL 无地区字段)
        - 枚举值跨章节不同 (筛选 [禁售/限售/警告] vs 数据源 [禁售/限售/告警] — 后者有"告警"非"警告")
        - 同一规则的具体值矛盾 (A 处 "默认 20 条", B 处 "默认 10 条")
        - 流程步骤跨章节顺序矛盾

        **不报**(模板化命名差异):
        - 大小写差异 (App_name vs app_name) — 除非业务上区分大小写
        - 同义词命名 (仲裁机构 vs 仲裁委员会, 通常上下文可推) — 除非该术语有官方定义
        - 标点/空格差异 (App-name vs App name)
        - 简繁体差异 (规则 vs 規則)

        fail 条件：发现 ≥1 处**语义对立**矛盾。severity: must

      V-06 章节完整性：
        检查项：对照以下必要章节清单，检查 PRD 是否缺少：
        - [ ] 技术约定节（框架、鉴权、基础路径）
        - [ ] 数据源定义（物理表/ES 索引/API）
        - [ ] 字段映射表（前端展示字段 → 数据源字段）
        - [ ] 功能需求列表（FR 编号）
        - [ ] 排序规则
        - [ ] 筛选规则
        - [ ] 分页规格
        - [ ] 异常/空态处理（四态 UI 或等价描述）
        fail 条件：缺少上述任意一个章节且未注明"不适用"。severity: must

      EV-01 验收标准存在性（must, experimental）：
        检查项：PRD 必须包含"完成定义"或"验收标准"章节，并满足：
        - 每条核心 FR 至少有一组 (输入条件 → 期望产出) 描述, 不接受"功能可用"等定性陈述
        - AI 评审可见: 章节标题含"验收"/"DoD"/"Definition of Done"/"Done When"/"通过条件"/"成功标准" 任一关键词
        - 至少 1 条验收标准能被开发独立判定 pass/fail (不依赖 PM 主观)
        fail 条件：(a) 无验收标准章节, 或 (b) 有章节但每条 FR 都没对应验收, 或 (c) 验收陈述均为"用户能用"等不可判定语句。
        severity: must
        # 2026-04-26 sprint Day3 实验上线: AI Coding 失败模式高发, 没 DoD 跑出来没人能验对错. status=experimental, 1 周后看数据决定升 active 或降级.

      FN-09 移动端 (uni-app) 与 Web 端必显式对齐（must, experimental）：
        # 2026-04-27 风鸟领域规则第一波: 风鸟全部 PRD 都跨端 + uni-app 混合架构 + "复用 Web 端" 顽固痼疾.
        # 与 V-05/V-07 (一致性矛盾检测) 协同 — V-05/V-07 反方向查矛盾, FN-09 正方向查"显式对齐"缺失.
        触发条件: PRD 同时含「移动端」「H5」「uni-app」「小程序」 + Web 端页面定义.
        触发后逐条检查 (5 子项, 缺任一即 fail):
        a) PRD 移动端章节不出现「复用 Web 端」「与 X 保持一致」「全都和立案信息 UI 保持一致」等未点明对象的隐式引用 (引用必须有具体章节号或锚点)
        b) PRD 显式标注每个移动端页面是「原生」还是「WebView」(走 pages/tools/webview 容器还是原生白名单)
        c) 移动端筛选维度与 Web 端筛选维度的差异在 PRD 中被列举 (如 Web 用案由/仲裁机构, 移动用省份/年份/公告类型) 而非笼统「移动端简化」
        d) 移动端不提供搜索框时, PRD 显式说明用什么交互替代 (筛选组合 / 历史关键词 / 不需要)
        e) 移动端字段映射的数据源 (area_code 映射省份, publish_date 提取年份等) 在 PRD 中显式给出
        fail 条件: 命中触发条件后任一子项缺失。severity: must
        注意: 请先看通用 V-05/V-07 是否已捕获同问题. 仅当通用规则未覆盖"显式对齐"维度时报 FN-09. 防止双倍 fail.
    checklist:
      - rule_id: "V-02"
        name: "文档版本与变更追踪"
        enabled: true
        owner: structure
      - rule_id: "V-03"
        name: "信息密度"
        enabled: true
        owner: structure
      - rule_id: "V-04"
        name: "FR 列表完整性"
        enabled: true
        owner: structure
      - rule_id: "V-05"
        name: "信息自洽性"
        enabled: true
        owner: structure
      - rule_id: "V-06"
        name: "章节完整性"
        enabled: true
        owner: structure
      - rule_id: "EV-01"
        name: "验收标准存在性"
        enabled: true
        owner: structure
        status: experimental    # 2026-04-26 sprint Day3 加, 1 周后看 reject_by_reason 决定升 active
      - rule_id: "FN-09"
        name: "移动端 (uni-app) 与 Web 端必显式对齐"
        enabled: true
        owner: structure
        status: experimental    # 2026-04-27 风鸟领域规则第一波 — 跨端"复用 Web 端"顽固痼疾
      - rule_id: "RC-002"
        name: "业务上下文章节存在"
        enabled: true
        owner: structure        # 2026-04-29 SSOT 审计激活: 需求来源/核心价值/目标用户三要素是 PRD 灵魂, 之前漏注册
      - rule_id: "RC-003"
        name: "数据契约章节存在"
        enabled: true
        owner: structure        # 2026-04-29 SSOT 审计激活: 章节存在性 vs RC-009/013 内容正确性, 角度不同非重复

  quality:
    name: "质量层"
    codename: "猫头鹰"
    model: "sonnet"
    wiki_keywords: ["逻辑", "一致", "合规", "完整", "质量", "矛盾", "歧义", "边界"]
    rules: |
      逐条检查以下 6 项，每条都必须给出 pass 或 fail 判定：

      V-07 逻辑一致性（交叉矛盾检测）：
        检查项：在 PRD 内部寻找以下矛盾：
        - 排序规则与字段映射矛盾（如"按发布日期排序"但字段映射表没有发布日期字段）
        - 筛选项与数据源矛盾（如"按地区筛选"但 DDL 中没有地区字段）
        - 不同章节对同一功能的描述矛盾（如 A 处说"默认 20 条"，B 处说"默认 10 条"）
        - 移动端与 Web 端描述矛盾（除非标注为"有意的端差异"）
        方法：提取 PRD 中所有规则/参数值，交叉比对。
        fail 条件：发现任何矛盾。severity: must

      V-08 歧义检测：
        检查项：标记以下歧义表述：
        - "等"（如"支持筛选仲裁机构、案由等"——"等"包含什么？）
        - "相关"（如"展示相关字段"——哪些字段？）
        - "类似"（如"类似企查查的展示方式"——具体哪个页面？）
        - "适当"/"合理"（如"适当截断长文本"——多少字截断？）
        - "参考"（如"参考现有模块"——哪个模块的哪个功能？）
        每处歧义必须引用原文位置。
        fail 条件：≥5 处影响开发实现的歧义。severity: should
        # 2026-04-26 sprint Day3: must → should + 阈值 3→5 (实测 P=0.25 / reject 75%, 模板词敏感)

      V-09 边界条件覆盖：
        检查项：对 PRD 中每个功能点，检查是否覆盖了以下边界场景：
        - 数据为空时的展示（空态）
        - 数据超长时的处理（截断/换行/省略号）
        - 分页最后一页不足一页时的展示
        - 筛选条件组合后无结果时的展示
        - 数值字段为 NULL/0/负值时的展示
        fail 条件：≥2 个功能点未覆盖边界条件。severity: should

      V-10 数据源可验证性：
        检查项：PRD 引用的每个数据表/字段/接口是否可验证？
        - 表名是否与 DDL 一致
        - 字段名是否与 DDL 一致
        - 数据类型是否匹配（如 PRD 说"文本"但 DDL 是 int）
        fail 条件：发现无法验证的数据引用。severity: must

      V-11 功能优先级与依赖：
        检查项：FR 列表中是否标注了优先级（P0/P1/P2）？
        是否有依赖关系说明（如"FR-05 依赖 FR-02 的接口"）？
        fail 条件：FR 数量≥5 但无优先级标注。severity: should

      V-12 异常处理完整性：
        检查项：对每个涉及外部数据/接口调用的功能，检查：
        - 接口超时时的展示
        - 数据加载失败时的展示
        - 网络断开时的展示
        是否有统一的异常处理规范（如"通用四态 UI"章节）？
        fail 条件：有数据加载功能但无任何异常处理描述。severity: must
    checklist:
      - rule_id: "V-07"
        name: "逻辑一致性"
        enabled: true
        owner: quality
      - rule_id: "V-08"
        name: "歧义检测"
        enabled: true
        owner: quality
      - rule_id: "V-09"
        name: "边界条件覆盖"
        enabled: true
        owner: quality
      - rule_id: "V-10"
        name: "数据源可验证性"
        enabled: true
        owner: quality
      - rule_id: "V-11"
        name: "功能优先级与依赖"
        enabled: true
        owner: quality
      - rule_id: "V-12"
        name: "异常处理完整性"
        enabled: true
        owner: quality
      - rule_id: "RC-012"
        name: "排序规则可执行"
        enabled: true
        owner: quality          # 2026-04-29 SSOT 审计激活: 排序键/顺序/优先级/NULL 处理是质量细节

  ai_coding:
    name: "AI Coding 友好度"
    codename: "渡鸦"
    model: "opus"  # 需要深度推理
    wiki_keywords: ["技术", "UI", "伪代码", "字段", "筛选", "DDL", "coding", "开发"]
    rules: |
      RC-004~RC-008, RC-013~RC-015，逐条检查：

      RC-004 技术约定节存在（must）：PRD 必须包含技术约定节（框架/鉴权方式/基础路径），不能依赖外部文档独立支撑开发。
      RC-005 四态 UI 规范已定义（must）：PRD 必须定义加载中/请求失败/筛选无结果/空数据四种 UI 状态的文案与样式。
      RC-006 图片路径使用相对路径（should）：PRD 中引用的图片应使用相对路径，避免绝对路径导致协作问题。
      RC-007 复杂联动逻辑有伪代码（should）：复杂联动逻辑、非结构化文本处理等必须有伪代码或流程描述。
      RC-008 筛选追溯完整（must）：筛选/查询逻辑须从用户操作追溯到 WHERE 条件，中间无断点。
      RC-013 伪代码字段可追溯（must）：伪代码中每个字段均可在 DDL 中找到；跨表字段标注 JOIN 来源。
      RC-015 非常规逻辑有示例（should）：非常规逻辑（继承/降级/空值）须有具体示例覆盖。
      # 2026-04-26 sprint Day3: 删 RC-014 (与 RC-008 内容重复, RC-014 实测 total=15 P=0.33 大概率重复触发拉低精度)
      # 2026-04-26 sprint Day3: RC-008 删尾段"非常规逻辑..." (与 RC-015 完全重叠, 让 RC-015 独家)

      FN-03 风鸟鉴权与基础路径硬约定（must, experimental）：
        # 2026-04-27 风鸟领域规则第一波: 风鸟 90% PRD 涉及接口, R-008 实测鉴权 TBD 反复出现.
        # 与 RC-004 (技术约定节存在) 协同 — RC-004 查"有没有", FN-03 查"值是不是 Bearer JWT".
        触发条件: PRD 含「技术约定」「鉴权」「Authorization」「API 接口」「base path」任一关键词章节.
        触发后逐条检查 (5 子项, 缺任一即 fail):
        a) PRD 鉴权方式明确写为 "Authorization: Bearer {token}" 或显式引用 wiki 页 [[concepts/JWT认证流程]]
        b) PRD 鉴权章节不含 "TBD" / "待技术确认" / "待补充" 字样
        c) PRD 列出每个接口的认证要求 (是 / 否 / 可选), 并与移动端硬约定一致 (/login/* /pay/wxNotify 不需鉴权; 详情查询类必须鉴权)
        d) PRD 接口路径以模块前缀开头 (如 /api/v1/<module>/* 或与 wiki 既有模块前缀一致), 不出现 /xxx/* 占位符
        e) 401 / Token 过期处理方案与风鸟规范一致 (跳转登录 + Refresh Token 续期, 不另起方案)
        fail 条件: 命中触发条件后任一子项缺失。severity: must
        注意: 请先看通用 RC-004 是否已捕获. 仅当 RC-004 已通过但具体值不符合风鸟硬约定时才报 FN-03. 防止双倍 fail.
    checklist:
      - rule_id: "RC-004"
        name: "技术约定节存在"
        enabled: true
        owner: ai_coding
      - rule_id: "RC-005"
        name: "四态 UI 规范已定义"
        enabled: true
        owner: ai_coding
      - rule_id: "RC-006"
        name: "图片路径使用相对路径"
        enabled: true
        owner: ai_coding
      - rule_id: "RC-007"
        name: "复杂联动逻辑有伪代码"
        enabled: true
        owner: ai_coding
      - rule_id: "RC-008"
        name: "筛选追溯完整"
        enabled: true
        owner: ai_coding
      - rule_id: "RC-013"
        name: "伪代码字段可追溯"
        enabled: true
        owner: ai_coding
      # 2026-04-26 sprint Day3: 删 RC-014 (与 RC-008 重复). 老 review_items 引用 RC-014 仍能解析, 后处理不会破.
      - rule_id: "RC-015"
        name: "非常规逻辑有示例"
        enabled: true
        owner: ai_coding
      - rule_id: "FN-03"
        name: "风鸟鉴权与基础路径硬约定"
        enabled: true
        owner: ai_coding
        status: experimental    # 2026-04-27 风鸟领域规则第一波 — 鉴权 TBD 顽固痼疾, R-008 实测
      - rule_id: "RC-011"
        name: "接口入参与出参定义"
        enabled: true
        owner: ai_coding        # 2026-04-29 SSOT 审计激活: 接口契约 must, 缺它对 AI Coding 致命无替代

  data_quality:
    name: "数据质量"
    codename: "鸬鹚"
    model: "sonnet"  # haiku 对复杂字段映射判定不够稳定，升级到 sonnet
    wiki_keywords: ["字段", "映射", "DDL", "数值", "数据", "JOIN", "物理表", "字段类型", "NOT NULL", "索引"]
    rules: |
      RC-009~RC-010，逐条检查：

      EV-04 AI 特性 eval 集计划（must, experimental, 仅 AI/ML PRD 触发）：
        # 2026-04-30 复活: 之前退役错了, 拿 baseline 好看换未来 AI PRD 漏报风险.
        # 风鸟未来必然有 AI 智能评分 / 推荐 / 排序特性, 规则必须常驻在岗.
        # SSOT 已用 synthetic mock 样本作为 positive_example, 真 AI PRD 出现时替换即可.
        触发条件: PRD 提到以下任一关键词时强检:
        - AI / LLM / 大模型 / 机器学习 / ML / 深度学习
        - 推荐 / 排序 / 分类 / 评分 / 预测 / 生成 (业务上是 AI 算法生成的)
        - 智能 (限定: 智能匹配/智能搜索/智能推荐/智能评分, 不含"智能手机/智能合约"等无关用法)
        - embedding / 向量 / similarity / 相似度模型

        触发后必须包含 3 项 (缺任一即 fail):
        (a) **评估集来源**: golden set 大小 (如 "100 条人工标注样例") + 标注方式 + 谁负责标注
        (b) **主要指标**: precision / recall / accuracy / F1 / NDCG / 业务转化率 任一可量化指标 +
            目标值 (如 "Precision >=0.8" 或 "v1 baseline 0.5 → v2 提到 0.65")
        (c) **回归测试触发**: 何时跑回归 (上线前必跑 / 模型升级触发 / 月度回归), 失败如何处理

        fail 条件: 触发关键词出现但缺 a/b/c 任一项。severity: must

        反例 (PM 写得对, 不要报):
        - 描述了 AI 推荐, 同章节注明 "评估集详见 [eval/recall_v2_goldenset.md] (200 条人工标注), 主指标 NDCG@5 >=0.7, 上线前回归"
        - 描述了 AI 分类, 注明 "复用现有 sklearn baseline (eval/classifier_v3.ipynb), 月度回归"
        - PRD 是规则驱动 (ORDER BY / WHERE 无 AI 介入), 不报本规则.

      RC-009 物理表定义一致性（must, 仅数据 PRD 触发）：
        # 2026-04-26 sprint Day3 REWRITE: 加触发条件, 配置类/迁移类/UI-only PRD 不应被强制
        触发条件: PRD 包含以下任一时才检查:
        - 引用了具体物理表名 (如 ds_risk_court_mediation, t_xxx)
        - 提到 DDL / 字段映射 / 数据库 schema
        - 包含字段映射表或 SQL/伪代码片段

        触发后逐条检查 (5 子项, 缺任一即 fail):
        a) 字段名与 DDL 一致 (字段映射表/JOIN 说明里的列名);
        b) 字段类型/长度 (VARCHAR(20) / INT / TIMESTAMP), 不允许"含糊类字段";
        c) 可空性 / NOT NULL / 默认值 (重要字段须明示);
        d) 索引与唯一约束 (用作筛选/排序/JOIN 键的字段须标注是否有索引);
        e) 跨表字段须标注 JOIN 来源 + 优先级。

        注意: 评审 agent 不连真实数据库查 schema, 仅基于 PRD 正文 + wiki 引用内部自洽判断。
        非数据 PRD (纯 UI / 流程 / 业务规则 / 配置变更等) 此规则跳过, 不应触发 fail。
      RC-010 数值类字段标注来源（must）：数值类字段（分页数/导出上限/阈值）须标注来源或标注 TBD；跨表字段须说明空值降级处理。

      FN-01 ds_risk_* 三段过滤约定（**风鸟硬约定, 命中 "ds_risk_" 必报**）：
        # 2026-04-30 强化: 原 prompt 让 worker"先看 RC-009 是否已覆盖", 导致 worker 把
        # FN-01 当成补漏项, 实际从不主动报. 改为强约束: ds_risk_ 出现即触发, 三段过滤
        # 任一缺即报, 不依赖 RC-009 状态. 双倍 fail 由报告去重处理.

        **强约束触发**: 在 PRD 任意位置发现字符串 "ds_risk_" (常见: ds_risk_court_mediation /
        ds_risk_court_lian / ds_risk_software_infringement_data 等) 立即激活本规则强检.

        触发后必查 3 段过滤 (缺任一即必报, 不要因为"PRD 看起来很完整"就放过):
        (1) entid > 0          — 主体过滤, 滤掉关联企业污染数据
        (2) data_status = 0    — 有效数据过滤, 滤掉已删除数据
        (3) riskbird_status = 0 — 风鸟展示过滤, 滤掉风鸟不展示数据

        检查方法: 全文搜索 "entid" / "data_status" / "riskbird_status" 关键字,
        在 SQL / 伪代码 / 业务规则表 / 通用规则节任一位置找到对应过滤条件即合格.
        全文都找不到任一字段的过滤声明 → 必报.

        fail 条件:
        - PRD 含 "ds_risk_" 字符串 + 任一过滤段缺失 → 必报 FN-01;
        - 例: 风鸟诉前调解 PRD 引用 ds_risk_court_mediation / ds_risk_court_lian
          但全文未声明 entid > 0 / data_status = 0 / riskbird_status = 0 任一项 →
          开发漏过滤会混入企业关联数据 / 已删数据 / 风鸟不展示数据, 必报.

        反例 (worker 不要报): PRD 全文不含 "ds_risk_" 字符串 (即不涉及 ds_risk_* 表),
        或 entid / data_status / riskbird_status 三段过滤均已显式列出.
        severity: must
    checklist:
      - rule_id: "RC-009"
        name: "物理表定义一致性"
        enabled: true
        owner: data_quality
      - rule_id: "RC-010"
        name: "数值类字段标注来源"
        enabled: true
        owner: data_quality
      - rule_id: "EV-04"
        name: "AI 特性 eval 集计划"
        enabled: true
        owner: data_quality
        status: experimental    # 2026-04-30 复活: synthetic positive_example 作 baseline 验证用, 真 AI PRD 出现时替换
      - rule_id: "FN-01"
        name: "ds_risk_* 三段过滤约定"
        enabled: true
        owner: data_quality
        status: experimental    # 2026-04-27 风鸟领域规则第一波 — 平台级硬 WHERE 条件
