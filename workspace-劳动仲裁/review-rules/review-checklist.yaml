# =============================================================
# workspace-劳动仲裁 review-checklist (SSOT extends 范本)
# =============================================================
#
# 本文件演示 v2 SSOT 模式: 用 extends 引用项目根 SSOT, 仅在本文件追加
# workspace 自定义规则 / 覆盖个别字段.
#
# 老 schema (直接列 rules 没 extends) 100% 兼容, 不需迁移也能跑.
# 但建议新建 workspace 都用 extends 模式, 避免规则副本漂移.
#
# 加载顺序:
# 1. SSOT 全部规则作为基础 (31 条 L3 升级规则)
# 2. additional_rules 追加在后
# 3. 同 id 时 additional_rules 覆盖 SSOT
#
# 详见 review/rule_loader.py 的 load_review_checklist()
# =============================================================

extends: ../../review-rules-shared/review-checklist.yaml

# 本 workspace 的自定义规则 / 覆盖
# (劳动仲裁场景目前不需自定义, SSOT 已涵盖. 留空 list 演示用法.)
additional_rules: []
